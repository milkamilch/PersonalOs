spring.datasource.url=jdbc:sqlite:lecturebase.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.port=8080

# Claude API (primär) – export CLAUDE_API_KEY=sk-ant-...
claude.api.key=${CLAUDE_API_KEY:}
claude.api.base-url=https://api.anthropic.com

# Gemini API (Fallback) – export GEMINI_API_KEY=AIza...
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com

# Voyage AI (optional) – export VOYAGE_API_KEY=pa-... für semantische Suche
voyage.api.key=${VOYAGE_API_KEY:}
voyage.api.base-url=https://api.voyageai.com

# Google Drive API (optional) – export GOOGLE_DRIVE_API_KEY=AIza... für Ordner-Import
# Drive API muss in der Google Cloud Console aktiviert sein
google.drive.api.key=${GOOGLE_DRIVE_API_KEY:}

# GitHub (optional) – export GITHUB_TOKEN=ghp_...
github.token=${GITHUB_TOKEN:}
github.username=${GITHUB_USERNAME:}

# Hetzner server monitoring (optional) – export SERVER_HOST=1.2.3.4
server.monitor.host=${SERVER_HOST:}

# OpenAI Whisper (optional) – export OPENAI_API_KEY=sk-... für Audio-Transkription
openai.api.key=${OPENAI_API_KEY:}
