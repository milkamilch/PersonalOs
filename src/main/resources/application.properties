spring.datasource.url=jdbc:sqlite:lecturebase.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.port=8080

# Claude API (primär) – export CLAUDE_API_KEY=sk-ant-...
claude.api.key=${CLAUDE_API_KEY:}
claude.api.base-url=https://api.anthropic.com

# Gemini API (Fallback) – export GEMINI_API_KEY=AIza...
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com

# Voyage AI (optional) – export VOYAGE_API_KEY=pa-... für semantische Suche
voyage.api.key=${VOYAGE_API_KEY:}
voyage.api.base-url=https://api.voyageai.com
