// VIEW: SUMMARY
// ═══════════════════════════════════════════════════════════════════
async function drawSum(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Zusammenfassung</div><div class="view-sub">KI-generierte Zusammenfassungen deiner Skripte</div></div>
      <div class="view-actions">
        <select class="form-select" id="sum-doc">
          <option value="">Dokument wählen…</option>${docOptions(S.sum.docId)}
        </select>
        <button class="btn btn-primary btn-sm" id="sum-gen"    >${IC.star} Generieren</button>
        <button class="btn btn-ghost btn-sm"   id="sum-rebuild">${IC.ref} Neu erstellen</button>
        <button class="btn btn-ghost btn-sm"   id="sum-exp"    >${IC.exp} Export</button>
      </div>
    </div>
    <div class="view-body">
      <div id="sum-body" style="max-width:700px"></div>
    </div>`;

  document.getElementById('sum-doc').onchange = async e=>{
    S.sum.docId = e.target.value ? +e.target.value : null;
    S.sum.text  = null;
    if (S.sum.docId) await loadSum();
    else drawSumBody();
  };

  const runGenSum = (rebuild) => {
    if (!S.sum.docId) { toast('Bitte erst ein Dokument wählen','inf'); return; }
    const btn   = document.getElementById(rebuild ? 'sum-rebuild' : 'sum-gen');
    const other = document.getElementById(rebuild ? 'sum-gen' : 'sum-rebuild');
    const body  = document.getElementById('sum-body');
    btn.disabled=true; btn.innerHTML=`${spinner()} ${rebuild?'Erstellt…':'Generiert…'}`;
    if (other) other.disabled=true;
    if (body) body.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:32px 0;color:var(--dim)">
      ${spinner()}<p style="font-size:13px" id="sum-progress-lbl">Zusammenfassung wird erstellt…</p>
      ${pbar()}</div>`;

    const es = new EventSource(`/api/summaries/generate-stream?documentId=${S.sum.docId}&rebuild=${!!rebuild}`);
    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      const lbl = document.getElementById('sum-progress-lbl');
      if (lbl) lbl.textContent = `Abschnitt ${d.batch} / ${d.totalBatches} verarbeitet…`;
    });
    es.addEventListener('done', e => {
      es.close();
      const r = JSON.parse(e.data);
      S.sum.text = r.summary;
      drawSumBody();
      toast(r.generated ? 'Zusammenfassung erstellt' : 'Aus Cache geladen', r.generated ? 'ok' : 'inf');
      btn.disabled=false; btn.innerHTML=rebuild ? `${IC.ref} Neu erstellen` : `${IC.star} Generieren`;
      if (other) other.disabled=false;
    });
    es.addEventListener('error', () => {
      es.close();
      toast('Fehler beim Generieren','err'); drawSumBody();
      btn.disabled=false; btn.innerHTML=rebuild ? `${IC.ref} Neu erstellen` : `${IC.star} Generieren`;
      if (other) other.disabled=false;
    });
  };
  document.getElementById('sum-gen').onclick     = ()=>runGenSum(false);
  document.getElementById('sum-rebuild').onclick = ()=>runGenSum(true);
  document.getElementById('sum-exp').onclick     = ()=>{
    if (!S.sum.docId) { toast('Kein Dokument gewählt','inf'); return; }
    window.open(`/api/export/summary/${S.sum.docId}`, '_blank');
  };

  if (S.sum.docId) await loadSum(); else drawSumBody();
}

async function loadSum() {
  const body=document.getElementById('sum-body');
  if(body) body.innerHTML=`<div style="color:var(--dim);font-size:13px">Lade…${pbar()}</div>`;
  try {
    S.sum.text = await api.sum(S.sum.docId);
    drawSumBody();
  } catch {
    S.sum.text=null; drawSumBody();
  }
}

function drawSumBody() {
  const body=document.getElementById('sum-body');
  if (!body) return;
  if (!S.sum.docId) {
    body.innerHTML=`<div class="empty">${IC.txt}<br><h3>Kein Dokument gewählt</h3>
      <p>Wähle ein Dokument oben oder generiere eine neue Zusammenfassung</p></div>`;
    return;
  }
  if (!S.sum.text) {
    body.innerHTML=`<div class="empty">${IC.txt}<br><h3>Noch keine Zusammenfassung</h3>
      <p>Klicke auf „Generieren" um eine zu erstellen</p></div>`;
    return;
  }
  const doc = S.docs.find(d=>d.id===S.sum.docId);
  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <span style="font-size:13px;font-weight:600;color:var(--primary-lt)">${esc(doc?.name||'')}</span>
      <span style="font-size:11px;color:var(--dim)">· Zusammenfassung</span>
    </div>
    <div class="card-lg">
      <p class="sum-text">${esc(S.sum.text)}</p>
    </div>`;
}

// ── Init ─────────────────────────────────────────────────────────────
async function init() {
  try { [S.docs, S.projects.list] = await Promise.all([api.docs(), api.projects()]); } catch {
    try { S.docs = await api.docs(); } catch {}
  }
  try {
    const st = await api.status();
    S.semantic = !!st.semantic;
  } catch {}
  try {
    const ids = await api.sessions();
    if (ids && ids.length) {
      const lastId = ids[0];
      const msgs   = await api.sessionMsgs(lastId);
      if (msgs && msgs.length) {
        S.chat.sid  = lastId;
        S.chat.msgs = msgs
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .map(m => ({
            role:    m.role,
            content: m.role === 'user' ? (m.content.includes('\n\nFrage: ')
              ? m.content.substring(m.content.lastIndexOf('\n\nFrage: ') + 9)
              : m.content) : m.content,
            sources: []
          }));
      }
    }
  } catch {}
  try {
    const [counts, exams] = await Promise.all([api.dueCounts(), api.examDates()]);
    S.dueCounts = counts || {};
    S.examDates = Object.fromEntries((exams||[]).map(e => [e.documentId, e]));
  } catch {}
  go('projects');
}
document.addEventListener('DOMContentLoaded', init);

// VIEW: PROJEKTE (#10 + #11 + #12)
// ═══════════════════════════════════════════════════════════════════
const PROJ_COLORS = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#db2777','#0891b2','#65a30d'];

async function drawProjects(el) {
  if (S.projects.active != null) { drawProjectDetail(el); return; }

  const reload = async () => {
    try { S.projects.list = await api.projects(); } catch {}
    drawProjects(el);
  };

  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Projekte</div>
           <div class="view-sub">${S.projects.list.length ? S.projects.list.length + ' Projekt' + (S.projects.list.length !== 1 ? 'e' : '') : 'Noch keine Projekte'}</div>
      </div>
      <div class="view-actions">
        <button class="btn btn-primary btn-sm" id="proj-new">+ Neues Projekt</button>
      </div>
    </div>
    <div class="view-body">
      ${S.projects.list.length === 0 ? `
        <div class="empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <h3>Noch keine Projekte</h3>
          <p>Erstelle dein erstes Projekt um Skripte, Notizen und Todos zu bündeln</p>
          <button class="btn btn-primary btn-sm" id="proj-new-empty" style="margin-top:8px">+ Erstes Projekt erstellen</button>
        </div>` : `
      <div class="proj-grid" id="proj-grid">
        ${S.projects.list.map(p => `
          <div class="proj-card" data-pid="${p.id}">
            <div class="proj-stripe" style="background:${esc(p.color)}"></div>
            <div class="proj-name">${esc(p.name)}</div>
            ${p.description ? `<div class="proj-desc">${esc(p.description)}</div>` : ''}
            <div class="proj-stats">
              <span>${IC.doc} ${p.docCount} Dok.</span>
              <span>${IC.card} ${p.openTodoCount > 0 ? `<b style="color:#f59e0b">${p.openTodoCount} offen</b>` : p.todoCount + ' Todos'}</span>
            </div>
          </div>`).join('')}
      </div>`}
    </div>`;

  el.querySelectorAll('.proj-card').forEach(card => {
    card.addEventListener('click', () => {
      S.projects.active = +card.dataset.pid;
      drawProjects(el);
    });
  });

  const openNewDialog = () => {
    const color = PROJ_COLORS[S.projects.list.length % PROJ_COLORS.length];
    const name = prompt('Projektname:');
    if (!name?.trim()) return;
    const desc = prompt('Kurzbeschreibung (optional):') || '';
    api.createProj(name.trim(), desc.trim(), color)
      .then(() => reload())
      .catch(() => toast('Fehler beim Erstellen', 'err'));
  };
  document.getElementById('proj-new')?.addEventListener('click', openNewDialog);
  document.getElementById('proj-new-empty')?.addEventListener('click', openNewDialog);
}

async function drawProjectDetail(el) {
  const pid = S.projects.active;
  const proj = S.projects.list.find(p => p.id === pid);
  if (!proj) { S.projects.active = null; drawProjects(el); return; }

  const [docs, notesData, todos] = await Promise.all([
    api.projDocs(pid).catch(() => []),
    api.projNotes(pid).catch(() => ({ content: '' })),
    api.todos(pid).catch(() => []),
  ]);

  const notes = notesData.content || '';

  const renderTodos = (list) => list.length === 0
    ? `<p style="color:var(--dim);font-size:13px">Noch keine Todos</p>`
    : list.map(t => `
      <div class="todo-item" data-tid="${t.id}">
        <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''}>
        <span class="todo-text${t.done ? ' done' : ''}">${esc(t.text)}</span>
        <span class="todo-del" data-tid="${t.id}">×</span>
      </div>`).join('');

  const availableDocs = S.docs.filter(d => !docs.some(pd => pd.id === d.id));

  el.innerHTML = `
    <div class="view-header">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-ghost btn-sm" id="proj-back">← Zurück</button>
        <div class="proj-stripe" style="background:${esc(proj.color)};width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block"></div>
        <div>
          <div class="view-title">${esc(proj.name)}</div>
          ${proj.description ? `<div class="view-sub">${esc(proj.description)}</div>` : ''}
        </div>
      </div>
      <div class="view-actions">
        <button class="btn btn-ghost btn-sm" id="proj-edit">Bearbeiten</button>
        <button class="btn btn-ghost btn-sm" id="proj-del" style="color:var(--error)">Löschen</button>
      </div>
    </div>
    <div class="view-body" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">

      <div>
        <div class="proj-detail-section">
          <div class="proj-detail-title">${IC.doc} Dokumente (${docs.length})</div>
          ${docs.length === 0 ? `<p style="color:var(--dim);font-size:13px">Noch keine Dokumente</p>` :
            `<div style="display:flex;flex-direction:column;gap:6px">${docs.map(d => `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
                <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cleanName(d.name))}</span>
                <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:11px" data-rid="${d.id}">×</button>
              </div>`).join('')}</div>`}
          ${availableDocs.length > 0 ? `
            <div style="margin-top:10px;display:flex;gap:8px">
              <select class="form-select" id="proj-doc-sel" style="flex:1;font-size:12px">
                <option value="">Dokument hinzufügen…</option>
                ${availableDocs.map(d => `<option value="${d.id}">${esc(cleanName(d.name))}</option>`).join('')}
              </select>
              <button class="btn btn-ghost btn-sm" id="proj-doc-add">+</button>
            </div>` : ''}
        </div>

        <div class="proj-detail-section">
          <div class="proj-detail-title">Notizen</div>
          <textarea class="notes-ta" id="proj-notes-ta" placeholder="Notizen, Links, Ideen…">${esc(notes)}</textarea>
          <button class="btn btn-ghost btn-sm" id="proj-notes-save" style="margin-top:8px;width:100%">Speichern</button>
        </div>
      </div>

      <div class="proj-detail-section">
        <div class="proj-detail-title" style="display:flex;align-items:center;gap:8px">
          Todos
          <span style="background:var(--surface-3);padding:1px 7px;border-radius:10px;font-size:11px;color:var(--dim)">${todos.filter(t=>!t.done).length} offen</span>
        </div>
        <div id="todo-list">${renderTodos(todos)}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input class="form-input" id="todo-inp" placeholder="Neue Aufgabe…" style="flex:1;font-size:13px">
          <button class="btn btn-primary btn-sm" id="todo-add">+</button>
        </div>
      </div>

    </div>`;

  // Back / Edit / Delete
  document.getElementById('proj-back').onclick = () => { S.projects.active = null; drawProjects(el); };

  document.getElementById('proj-edit').onclick = () => {
    const name = prompt('Projektname:', proj.name);
    if (!name?.trim()) return;
    const desc = prompt('Beschreibung:', proj.description || '') || '';
    api.updateProj(pid, name.trim(), desc.trim(), proj.color)
      .then(async () => { S.projects.list = await api.projects().catch(()=>S.projects.list); drawProjectDetail(el); })
      .catch(() => toast('Fehler', 'err'));
  };

  document.getElementById('proj-del').onclick = () => {
    if (!confirm(`Projekt „${proj.name}" wirklich löschen?`)) return;
    api.deleteProj(pid).then(() => {
      S.projects.active = null;
      api.projects().then(l => { S.projects.list = l; drawProjects(el); });
    }).catch(() => toast('Fehler', 'err'));
  };

  // Remove doc from project
  el.querySelectorAll('[data-rid]').forEach(btn => {
    btn.addEventListener('click', async () => {
      await api.remProjDoc(pid, +btn.dataset.rid).catch(() => {});
      drawProjectDetail(el);
    });
  });

  // Add doc to project
  document.getElementById('proj-doc-add')?.addEventListener('click', async () => {
    const sel = document.getElementById('proj-doc-sel');
    if (!sel?.value) return;
    await api.addProjDoc(pid, +sel.value).catch(() => {});
    drawProjectDetail(el);
  });

  // Notes save
  document.getElementById('proj-notes-save').onclick = async () => {
    const content = document.getElementById('proj-notes-ta')?.value || '';
    await api.saveProjNotes(pid, content).catch(() => {});
    toast('Notizen gespeichert', 'ok');
  };

  // Todos
  const reloadTodos = async () => {
    const fresh = await api.todos(pid).catch(() => []);
    const list  = document.getElementById('todo-list');
    if (list) list.innerHTML = renderTodos(fresh);
    wireTodos();
  };

  const wireTodos = () => {
    el.querySelectorAll('.todo-check').forEach(cb => {
      cb.addEventListener('change', async () => {
        const tid = +cb.closest('.todo-item').dataset.tid;
        await api.doneTodo(tid, cb.checked).catch(() => {});
        await reloadTodos();
      });
    });
    el.querySelectorAll('.todo-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        await api.deleteTodo(+btn.dataset.tid).catch(() => {});
        await reloadTodos();
      });
    });
  };

  const addTodo = async () => {
    const inp = document.getElementById('todo-inp');
    const text = inp?.value.trim();
    if (!text) return;
    inp.value = '';
    await api.createTodo(pid, text).catch(() => toast('Fehler', 'err'));
    await reloadTodos();
  };

  document.getElementById('todo-add').onclick = addTodo;
  document.getElementById('todo-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  wireTodos();
}

// VIEW: DASHBOARD
// ═══════════════════════════════════════════════════════════════════
async function drawDashboard(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Dashboard</div><div class="view-sub">Dein Lernfortschritt auf einen Blick</div></div>
    </div>
    <div class="view-body">
      <div id="dash-body" style="max-width:760px">${spinner()} Lade…</div>
    </div>`;

  try {
    const s = await api.stats();
    S.dash.stats = s;
    const body = document.getElementById('dash-body');
    if (!body) return;

    const streakColor = s.streak >= 7 ? '#f59e0b' : s.streak >= 3 ? '#10b981' : 'var(--primary-lt)';
    const streakEmoji = s.streak >= 14 ? '🔥' : s.streak >= 7 ? '⚡' : s.streak >= 3 ? '✨' : '📚';

    body.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px">
        ${statCard(streakEmoji + ' ' + s.streak, 'Tage Streak', streakColor)}
        ${statCard(s.todayCount, 'Heute gelernt', s.todayCount > 0 ? '#10b981' : 'var(--dim)')}
        ${statCard(s.totalCards, 'Lernkarten gesamt', 'var(--primary-lt)')}
        ${statCard(s.totalDocs,  'Dokumente', 'var(--primary-lt)')}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:18px">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Noch zu tun</div>
          ${todoRow('Ohne Lernkarten', s.docsWithoutCards,   s.totalDocs, '#ef4444')}
          ${todoRow('Ohne Mind Map',   s.docsWithoutMindmap, s.totalDocs, '#f59e0b')}
          ${todoRow('Mit Karten bereit',
            s.totalDocs - s.docsWithoutCards, s.totalDocs, '#10b981')}
        </div>
        <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:18px">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px">Schnellzugriff</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('fc')">
              ${IC.card} Lernkarten öffnen
            </button>
            <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('mm')">
              ${IC.net} Mind Map öffnen
            </button>
            <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('sum')">
              ${IC.txt} Zusammenfassung öffnen
            </button>
          </div>
        </div>
      </div>`;
  } catch {
    const body = document.getElementById('dash-body');
    if (body) body.innerHTML = `<div class="empty">${IC.dash}<br><h3>Fehler beim Laden</h3></div>`;
  }
}

function statCard(value, label, color) {
  return `<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:18px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:${color}">${value}</div>
    <div style="font-size:12px;color:var(--dim);margin-top:4px">${label}</div>
  </div>`;
}

function todoRow(label, value, total, color) {
  const pct = total > 0 ? Math.round(value / total * 100) : 0;
  return `<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span>${label}</span><span style="color:${color}">${value}</span>
    </div>
    <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:${color};border-radius:2px"></div>
    </div>
  </div>`;
}

// QUIZ MODAL (Mind Map)
// ═══════════════════════════════════════════════════════════════════
function openQuizModal(concepts) {
  let modal = document.getElementById('quiz-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'quiz-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7)';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);width:min(580px,95vw);max-height:90vh;overflow-y:auto;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div style="font-size:15px;font-weight:600">${IC.quiz} Quiz generieren</div>
        <button class="btn btn-ghost btn-sm" id="quiz-close">✕</button>
      </div>
      <div id="quiz-content" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px 0">
        ${spinner()}<p style="color:var(--dim);font-size:13px">Fragen werden erstellt…</p>
      </div>
    </div>`;

  document.getElementById('quiz-close').onclick = () => modal.remove();
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  api.quiz(concepts.slice(0, 15)).then(questions => {
    renderQuiz(questions);
  }).catch(() => {
    document.getElementById('quiz-content').innerHTML =
      `<p style="color:var(--error)">Fehler beim Generieren</p>`;
  });
}

function renderQuiz(questions) {
  const el = document.getElementById('quiz-content');
  if (!el || !questions?.length) {
    if (el) el.innerHTML = '<p style="color:var(--dim)">Keine Fragen generiert</p>';
    return;
  }
  let current = 0, score = 0, answered = false;
  const showQ = () => {
    if (current >= questions.length) {
      el.innerHTML = `
        <div style="text-align:center">
          <div style="font-size:40px">${score >= questions.length * .8 ? '🎉' : score >= questions.length * .5 ? '💪' : '📚'}</div>
          <div style="font-size:28px;font-weight:700;color:var(--primary-lt);margin:8px 0">${score}/${questions.length}</div>
          <div style="color:var(--dim);font-size:13px">Richtige Antworten</div>
          <button class="btn btn-primary btn-sm" style="margin-top:16px" id="quiz-restart">Nochmal</button>
        </div>`;
      document.getElementById('quiz-restart')?.addEventListener('click', ()=>{ current=0; score=0; showQ(); });
      return;
    }
    const q = questions[current];
    answered = false;
    el.innerHTML = `
      <div style="width:100%">
        <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Frage ${current+1} / ${questions.length}</div>
        <div style="font-size:14px;font-weight:500;margin-bottom:16px">${esc(q.question)}</div>
        <div style="display:flex;flex-direction:column;gap:8px" id="quiz-opts">
          ${(q.options||[]).map((opt,i)=>`
            <button class="btn btn-ghost" data-i="${i}" style="justify-content:flex-start;text-align:left">
              <span style="min-width:20px;color:var(--dim)">${'ABCD'[i]}.</span> ${esc(opt)}
            </button>`).join('')}
        </div>
        <div id="quiz-expl" style="display:none;margin-top:14px;padding:12px;background:var(--surface-3);border-radius:var(--r-sm);font-size:13px;color:var(--dim)"></div>
        <div style="display:flex;justify-content:flex-end;margin-top:14px">
          <button class="btn btn-primary btn-sm" id="quiz-next" style="display:none">Weiter →</button>
        </div>
      </div>`;

    el.querySelectorAll('#quiz-opts button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (answered) return;
        answered = true;
        const chosen = +btn.dataset.i;
        const correct = q.correct ?? 0;
        if (chosen === correct) { score++; btn.style.borderColor='#22c55e'; btn.style.background='#22c55e20'; }
        else { btn.style.borderColor='#ef4444'; btn.style.background='#ef444420';
          el.querySelectorAll('#quiz-opts button')[correct].style.borderColor='#22c55e';
          el.querySelectorAll('#quiz-opts button')[correct].style.background='#22c55e20'; }
        const expl = document.getElementById('quiz-expl');
        if (expl && q.explanation) { expl.style.display='block'; expl.textContent = q.explanation; }
        const next = document.getElementById('quiz-next');
        if (next) { next.style.display=''; next.addEventListener('click', ()=>{ current++; showQ(); }); }
      });
    });
  };
  showQ();
}
</script>
