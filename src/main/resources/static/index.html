<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LectureBase</title>
  <style>
    :root {
      --bg:           #0d0f17;
      --surface-1:    #12141c;
      --surface-2:    #1a1d27;
      --surface-3:    #242838;
      --border:       #2d3148;
      --border-light: #3d4468;
      --primary:      #7c3aed;
      --primary-h:    #6d28d9;
      --primary-lt:   #a78bfa;
      --primary-glow: rgba(124,58,237,.15);
      --text:         #e2e8f0;
      --muted:        #94a3b8;
      --dim:          #64748b;
      --success:      #10b981;
      --error:        #ef4444;
      --r:            10px;
      --r-sm:         6px;
      --r-lg:         14px;
      --t:            180ms ease;
      --sidebar:      220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; overflow: hidden; font-size: 14px; line-height: 1.5;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar); background: var(--surface-1);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      padding: 16px 10px; gap: 3px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px 18px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
    }
    .brand-icon {
      width: 30px; height: 30px; flex-shrink: 0;
      background: linear-gradient(135deg,#7c3aed,#a855f7);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .brand-name span { color: var(--primary-lt); }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 11px; border-radius: var(--r-sm);
      cursor: pointer; color: var(--muted); transition: all var(--t);
      font-size: 13px; font-weight: 500; border: 1px solid transparent;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active {
      background: var(--primary-glow); color: var(--primary-lt);
      border-color: rgba(124,58,237,.3);
    }
    .sidebar-footer {
      margin-top: auto; padding: 14px 10px 0;
      border-top: 1px solid var(--border);
      color: var(--dim); font-size: 11px;
    }

    /* ── Main ────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .view-header {
      padding: 18px 26px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface-1); display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .view-title  { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
    .view-sub    { color: var(--dim); font-size: 11px; margin-top: 1px; }
    .view-actions{ margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .view-body   { flex: 1; overflow-y: auto; padding: 22px 26px; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r-sm); border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all var(--t); line-height: 1;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-3); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Form ────────────────────────────────────────────── */
    .form-select, .form-input {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      padding: 6px 11px; font-size: 13px; outline: none; font-family: inherit;
    }
    .form-select:focus, .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--dim); }

    /* ── Cards ───────────────────────────────────────────── */
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .card-lg {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }

    /* ── Tags ────────────────────────────────────────────── */
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500;
      background: rgba(124,58,237,.14); color: var(--primary-lt);
      border: 1px solid rgba(124,58,237,.22);
    }
    .tag-x {
      cursor: pointer; background: none; border: none; color: inherit;
      opacity: .6; padding: 0; font-size: 12px; line-height: 1;
    }
    .tag-x:hover { opacity: 1; }

    /* ── Upload zone ─────────────────────────────────────── */
    #upload-zone {
      border: 2px dashed var(--border-light); border-radius: var(--r-lg);
      padding: 36px 24px; text-align: center; cursor: pointer;
      transition: all var(--t); background: var(--surface-1); margin-bottom: 22px;
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: var(--primary); background: var(--primary-glow);
    }
    #upload-input { display: none; }
    .upload-label { font-weight: 500; margin-bottom: 4px; }
    .upload-hint  { color: var(--dim); font-size: 12px; }

    /* ── Doc grid ────────────────────────────────────────── */
    .doc-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 14px;
    }
    .doc-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 16px; transition: border-color var(--t);
    }
    .doc-card:hover { border-color: var(--border-light); }
    .doc-name  { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .doc-meta  { color: var(--dim); font-size: 11px; margin-bottom: 10px; }
    .doc-tags  { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; min-height: 20px; }
    .doc-acts  { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── Chat ────────────────────────────────────────────── */
    #chat-wrap { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    #chat-bar  {
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      background: var(--surface-1); display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    }
    #messages  {
      flex: 1; overflow-y: auto; padding: 22px 18px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .msg { display: flex; gap: 11px; max-width: 760px; }
    .msg-user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .msg-user .msg-avatar      { background: var(--primary); color: #fff; }
    .msg-assistant .msg-avatar { background: var(--surface-3); border: 1px solid var(--border); color: var(--primary-lt); }
    .msg-bubble {
      padding: 10px 14px; border-radius: 14px; line-height: 1.65; font-size: 13.5px;
    }
    .msg-user .msg-bubble      { background: var(--primary); color: #fff; border-bottom-right-radius: 3px; }
    .msg-assistant .msg-bubble { background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .sources { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .src-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      background: var(--surface-3); border: 1px solid var(--border); color: var(--muted);
    }
    #chat-input-area {
      padding: 14px 18px; border-top: 1px solid var(--border);
      background: var(--surface-1); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-ta {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); padding: 9px 13px;
      font-size: 13.5px; font-family: inherit; resize: none;
      min-height: 42px; max-height: 120px; outline: none; transition: border-color var(--t);
    }
    .chat-ta:focus { border-color: var(--primary); }

    /* ── Flashcards ──────────────────────────────────────── */
    .fc-scene { width: 540px; height: 300px; perspective: 1000px; }
    .fc-card  {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform .5s ease; cursor: pointer;
    }
    .fc-card.flipped { transform: rotateY(180deg); }
    .fc-face {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: 18px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
    }
    .fc-front { background: linear-gradient(135deg,#1a1d27,#242838); border: 1px solid var(--border-light); }
    .fc-back  { background: linear-gradient(135deg,#1e1240,#2a1b4e); border: 1px solid rgba(124,58,237,.4); transform: rotateY(180deg); }
    .fc-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }
    .fc-back .fc-label { color: var(--primary-lt); opacity: .7; }
    .fc-text  { font-size: 17px; font-weight: 500; line-height: 1.6; }
    .fc-hint  { font-size: 11px; color: var(--dim); margin-top: 14px; }
    .fc-nav   { display: flex; align-items: center; gap: 18px; }
    .fc-count { font-size: 13px; color: var(--dim); min-width: 56px; text-align: center; }
    .fc-dots  { display: flex; gap: 6px; }
    .fc-dot   { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background var(--t); }
    .fc-dot.on{ background: var(--primary); }

    /* ── Mind Map ────────────────────────────────────────── */
    #mm-view  { display: flex; flex-direction: column; height: 100%; }
    #mm-bar   {
      padding: 10px 18px; background: var(--surface-1); border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    }
    #mm-canvas{ flex: 1; position: relative; }
    #mm-canvas svg { width: 100%; height: 100%; }
    #mm-tip   {
      position: absolute; background: var(--surface-3); border: 1px solid var(--border-light);
      border-radius: var(--r); padding: 8px 12px; font-size: 12px;
      pointer-events: none; opacity: 0; transition: opacity .12s; max-width: 180px;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 6px 11px;
    }
    .search-wrap input {
      background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 170px;
    }
    .search-wrap input::placeholder { color: var(--dim); }

    /* ── Summary ─────────────────────────────────────────── */
    .sum-text { line-height: 1.85; font-size: 14.5px; white-space: pre-line; color: var(--text); }

    /* ── Empty / spinner / progress ──────────────────────── */
    .empty {
      text-align: center; padding: 56px 20px; color: var(--dim);
    }
    .empty svg { margin-bottom: 14px; opacity: .35; }
    .empty h3  { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .empty p   { font-size: 12px; }
    .spinner   {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
      border-radius: 50%; animation: spin .55s linear infinite; vertical-align: middle;
    }
    .pbar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .pfill{ height: 100%; background: var(--primary); border-radius: 3px; animation: prog 1.4s ease infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes prog {
      0%   { width:0%;  margin-left:0;    }
      50%  { width:55%; margin-left:22%;  }
      100% { width:0%;  margin-left:100%; }
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 22px; right: 22px; z-index: 999;
      display: flex; flex-direction: column; gap: 7px;
    }
    .toast {
      padding: 9px 15px; border-radius: var(--r); font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      animation: tslide .18s ease; box-shadow: 0 4px 18px rgba(0,0,0,.45);
    }
    .t-ok  { background:#064e3b; color:#a7f3d0; border:1px solid #065f46; }
    .t-err { background:#450a0a; color:#fca5a5; border:1px solid #7f1d1d; }
    .t-inf { background:#1e1b4b; color:#c4b5fd; border:1px solid #3730a3; }
    @keyframes tslide { from { transform:translateX(110%);opacity:0; } to { transform:none;opacity:1; } }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- MAIN -->
<div id="main"></div>
<div id="toasts"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── Icons ────────────────────────────────────────────────────────────
const IC = {
  up:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`,
  star: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  ref:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`,
  send: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  net:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/></svg>`,
  card: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="20" x2="16" y2="20"/><line x1="12" y1="18" x2="12" y2="20"/></svg>`,
  txt:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>`,
  chat: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  doc:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  exp:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
};

// ── State ────────────────────────────────────────────────────────────
const S = {
  view: 'docs', docs: [],
  chat: { msgs: [], sid: null, docId: null, busy: false },
  fc:   { cards: [], idx: 0, flip: false, docId: null },
  sum:  { text: null, docId: null },
};

// ── API ──────────────────────────────────────────────────────────────
const api = {
  async req(url, o={}) {
    const r = await fetch(url, o);
    if (!r.ok) throw new Error(r.status);
    const ct = r.headers.get('content-type')||'';
    return ct.includes('json') ? r.json() : r.text();
  },
  docs:       ()        => api.req('/api/documents'),
  upload:     fd        => api.req('/api/upload', {method:'POST', body:fd}),
  ask:        b         => api.req('/api/ask', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}),
  mm:         ()        => api.req('/api/mindmap'),
  buildMm:    id        => api.req(`/api/mindmap/build${id?'?documentId='+id:''}`, {method:'POST'}),
  fc:         id        => api.req(`/api/flashcards${id?'?documentId='+id:''}`),
  genFc:      id        => api.req(`/api/flashcards/generate?documentId=${id}`, {method:'POST'}),
  sum:        id        => api.req(`/api/summaries/${id}`),
  genSum:     id        => api.req(`/api/summaries/generate?documentId=${id}`, {method:'POST'}),
  addTags:    (id,tags) => api.req(`/api/documents/${id}/tags`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(tags)}),
  delTag:     (id,tag)  => api.req(`/api/documents/${id}/tags/${encodeURIComponent(tag)}`, {method:'DELETE'}),
};

// ── Helpers ──────────────────────────────────────────────────────────
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const main = () => document.getElementById('main');

function toast(msg, type='inf') {
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<span>${{ok:'✓',err:'✕',inf:'ℹ'}[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3600);
}

function spinner() { return `<span class="spinner"></span>`; }
function pbar()    { return `<div class="pbar"><div class="pfill"></div></div>`; }

function docOptions(selId) {
  return S.docs.map(d=>`<option value="${d.id}"${d.id==selId?' selected':''}>${esc(d.name)}</option>`).join('');
}

// ── Router ───────────────────────────────────────────────────────────
function go(view) {
  S.view = view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`nav-${view}`)?.classList.add('active');
  draw();
}

function draw() {
  const el = main(); el.innerHTML='';
  if (S.view==='docs') drawDocs(el);
  else if (S.view==='chat') drawChat(el);
  else if (S.view==='mm')   drawMM(el);
  else if (S.view==='fc')   drawFC(el);
  else if (S.view==='sum')  drawSum(el);
}

// VIEW: DOCUMENTS
// ═══════════════════════════════════════════════════════════════════
function drawDocs(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Dokumente</div><div class="view-sub">Skripte hochladen &amp; verwalten</div></div>
    </div>
    <div class="view-body">
      <div id="upload-zone">
        <input type="file" id="upload-input" accept=".pdf,.docx" multiple>
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="1.5" stroke-linecap="round"
             style="display:block;margin:0 auto 12px"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
             <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <p class="upload-label">PDF oder DOCX hierher ziehen</p>
        <p class="upload-hint">oder klicken zum Auswählen</p>
        <div id="up-prog" style="display:none;margin-top:14px">${pbar()}</div>
      </div>
      <div id="doc-grid"></div>
    </div>`;

  const zone  = document.getElementById('upload-zone');
  const input = document.getElementById('upload-input');
  zone.addEventListener('click', ()=>input.click());
  zone.addEventListener('dragover', e=>{e.preventDefault(); zone.classList.add('drag-over');});
  zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e=>{e.preventDefault(); zone.classList.remove('drag-over'); doUpload(e.dataTransfer.files);});
  input.addEventListener('change', ()=>doUpload(input.files));

  renderDocGrid();
}

async function doUpload(files) {
  const prog = document.getElementById('up-prog');
  if (prog) prog.style.display='block';
  for (const f of files) {
    const fd = new FormData(); fd.append('file', f);
    try {
      const r = await api.upload(fd);
      toast(`„${r.name}" hochgeladen · ${r.chunks} Chunks`, 'ok');
    } catch { toast(`Fehler: ${f.name}`, 'err'); }
  }
  if (prog) prog.style.display='none';
  S.docs = await api.docs().catch(()=>S.docs);
  renderDocGrid();
}

function renderDocGrid() {
  const grid = document.getElementById('doc-grid');
  if (!grid) return;
  if (!S.docs.length) {
    grid.innerHTML = `<div class="empty">
      ${IC.doc}<br><h3>Noch keine Dokumente</h3><p>Lade dein erstes Vorlesungsskript hoch</p></div>`;
    return;
  }
  grid.innerHTML = `<div class="doc-grid">${S.docs.map(docCard).join('')}</div>`;

  grid.querySelectorAll('.tag-x').forEach(btn=>btn.addEventListener('click', async e=>{
    const {id, tag} = e.currentTarget.dataset;
    await api.delTag(id, tag).catch(()=>{});
    S.docs = await api.docs().catch(()=>S.docs); renderDocGrid();
  }));

  grid.querySelectorAll('.tag-in').forEach(inp=>inp.addEventListener('keydown', async e=>{
    if (e.key!=='Enter' || !inp.value.trim()) return;
    await api.addTags(inp.dataset.id, [inp.value.trim()]).catch(()=>{});
    inp.value='';
    S.docs = await api.docs().catch(()=>S.docs); renderDocGrid();
  }));

  grid.querySelectorAll('[data-act]').forEach(btn=>btn.addEventListener('click', e=>{
    const {act, id} = e.currentTarget.dataset;
    if (act==='chat')  { S.chat.docId=+id; go('chat'); }
    if (act==='sum')   { S.sum.docId=+id;  go('sum');  }
    if (act==='fc')    { S.fc.docId=+id; S.fc.idx=0; S.fc.flip=false; go('fc'); }
    if (act==='mm')    { go('mm'); setTimeout(()=>triggerBuildMM(+id), 200); }
  }));
}

function docCard(d) {
  const tags = (d.tags||[]).map(t=>
    `<span class="tag">${esc(t)}<button class="tag-x" data-id="${d.id}" data-tag="${esc(t)}">×</button></span>`
  ).join('');
  const date = d.uploadedAt ? new Date(d.uploadedAt).toLocaleDateString('de') : '';
  return `<div class="doc-card">
    <div class="doc-name" title="${esc(d.name)}">${IC.doc} ${esc(d.name)}</div>
    <div class="doc-meta">${date}</div>
    <div class="doc-tags">
      ${tags}
      <input class="form-input tag-in" data-id="${d.id}"
             style="padding:2px 7px;font-size:11px;width:80px" placeholder="+ Tag">
    </div>
    <div class="doc-acts">
      <button class="btn btn-ghost btn-sm" data-act="chat" data-id="${d.id}">${IC.chat} Chat</button>
      <button class="btn btn-ghost btn-sm" data-act="sum"  data-id="${d.id}">${IC.txt}  Zusammenfassung</button>
      <button class="btn btn-ghost btn-sm" data-act="fc"   data-id="${d.id}">${IC.card} Lernkarten</button>
      <button class="btn btn-ghost btn-sm" data-act="mm"   data-id="${d.id}">${IC.net}  Mind Map</button>
    </div>
  </div>`;
}

function drawChat(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">KI-Chat</div><div class="view-sub">Fragen zu deinen Skripten stellen</div></div>
      <div class="view-actions">
        <button class="btn btn-ghost btn-sm" onclick="newChat()">Neue Sitzung</button>
        <button class="btn btn-ghost btn-sm" id="btn-exp" onclick="exportChat()" style="${S.chat.sid?'':'display:none'}">${IC.exp} Export</button>
      </div>
    </div>
    <div id="chat-wrap">
      <div id="chat-bar">
        <span style="font-size:11px;color:var(--dim)">Dokument:</span>
        <select class="form-select" id="chat-doc" style="font-size:12px">
          <option value="">Alle</option>${docOptions(S.chat.docId)}
        </select>
        ${S.chat.sid ? `<span style="font-size:11px;color:var(--dim);margin-left:auto">Sitzung aktiv</span>` : ''}
      </div>
      <div id="messages">${buildMsgs()}</div>
      <div id="chat-input-area">
        <div class="input-row">
          <textarea class="chat-ta" id="chat-in" placeholder="Frage eingeben… (Enter zum Senden, Shift+Enter für Zeilenumbruch)" rows="1"></textarea>
          <button class="btn btn-primary" onclick="sendMsg()">${IC.send}</button>
        </div>
      </div>
    </div>`;

  const ta = document.getElementById('chat-in');
  ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
  ta.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
  document.getElementById('chat-doc').addEventListener('change', e=>{ S.chat.docId = e.target.value ? +e.target.value : null; });
  scrollMsgs();
}

function buildMsgs() {
  if (!S.chat.msgs.length) return `<div class="empty">
    ${IC.chat}<br><h3>Noch keine Nachrichten</h3>
    <p>Stelle eine Frage zu deinen Vorlesungsskripten</p></div>`;
  return S.chat.msgs.map(m => {
    if (m.role==='user') return `
      <div class="msg msg-user">
        <div class="msg-avatar">Du</div>
        <div><div class="msg-bubble">${esc(m.content)}</div></div>
      </div>`;
    const srcs = (m.sources||[]).length
      ? `<div class="sources">${m.sources.map(s=>`<span class="src-chip">${IC.doc} Seite ${s.page}</span>`).join('')}</div>`
      : '';
    return `
      <div class="msg msg-assistant">
        <div class="msg-avatar">AI</div>
        <div><div class="msg-bubble">${esc(m.content)}</div>${srcs}</div>
      </div>`;
  }).join('');
}

function scrollMsgs() { const el=document.getElementById('messages'); if(el) setTimeout(()=>el.scrollTop=el.scrollHeight,40); }

async function sendMsg() {
  const ta   = document.getElementById('chat-in');
  const text = ta?.value.trim();
  if (!text || S.chat.busy) return;
  S.chat.busy = true;
  S.chat.msgs.push({role:'user', content:text});
  ta.value=''; ta.style.height='auto';

  const msgs = document.getElementById('messages');
  if (msgs) {
    msgs.innerHTML = buildMsgs();
    msgs.insertAdjacentHTML('beforeend',`
      <div class="msg msg-assistant" id="thinking">
        <div class="msg-avatar">AI</div>
        <div class="msg-bubble" style="color:var(--dim)">${spinner()} Denkt nach…</div>
      </div>`);
    scrollMsgs();
  }
  try {
    const r = await api.ask({ question:text, tag:null, sessionId:S.chat.sid });
    S.chat.sid = r.sessionId;
    S.chat.msgs.push({role:'assistant', content:r.answer, sources:r.sources});
    document.getElementById('btn-exp')?.style.removeProperty('display');
  } catch {
    S.chat.msgs.push({role:'assistant', content:'Fehler beim Abrufen der Antwort.', sources:[]});
    toast('Fehler beim KI-Chat', 'err');
  } finally {
    S.chat.busy = false;
    const m2 = document.getElementById('messages');
    if (m2) { m2.innerHTML = buildMsgs(); scrollMsgs(); }
  }
}

function newChat()  { S.chat.msgs=[]; S.chat.sid=null; draw(); }
function exportChat(){ if(S.chat.sid) window.open(`/api/export/${S.chat.sid}?format=markdown`,'_blank'); }

let mmSim, mmLinks, mmNodes;

function drawMM(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Mind Map</div><div class="view-sub">Konzepte &amp; Cluster visualisieren</div></div>
    </div>
    <div id="mm-view">
      <div id="mm-bar">
        <select class="form-select" id="mm-doc" style="font-size:12px">
          <option value="">Alle Dokumente</option>${docOptions(null)}
        </select>
        <button class="btn btn-primary btn-sm" id="mm-build">${IC.net} Aufbauen</button>
        <button class="btn btn-ghost btn-sm"   id="mm-ref"  >${IC.ref} Aktualisieren</button>
        <div class="search-wrap">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="mm-search" placeholder="Konzept suchen…">
        </div>
        <span id="mm-status" style="font-size:12px;color:var(--dim);margin-left:auto">–</span>
      </div>
      <div id="mm-canvas"><svg id="mm-svg"></svg><div id="mm-tip"></div></div>
    </div>`;

  document.getElementById('mm-build').onclick = ()=>{
    const id = document.getElementById('mm-doc').value;
    triggerBuildMM(id ? +id : null);
  };
  document.getElementById('mm-ref').onclick   = loadMM;
  document.getElementById('mm-search').oninput = function(){ mmHighlight(this.value); };
  loadMM();
}

async function loadMM() {
  const st = document.getElementById('mm-status');
  if (st) st.textContent='Lade…';
  try {
    const data = await api.mm();
    if (!data.nodes?.length) { if(st) st.textContent='Keine Konzepte – erst „Aufbauen" klicken'; return; }
    if (st) st.textContent=`${data.nodes.length} Konzepte · ${data.links.length} Verbindungen`;
    drawD3(data);
  } catch { if(st) st.textContent='Fehler beim Laden'; }
}

async function triggerBuildMM(docId) {
  const btn = document.getElementById('mm-build');
  const st  = document.getElementById('mm-status');
  if (btn) { btn.disabled=true; btn.textContent='Verarbeite…'; }
  if (st)  st.textContent='Claude extrahiert Konzepte…';
  try {
    const r = await api.buildMm(docId);
    toast(`${r.processedChunks} Chunks · ${r.extractedConcepts} Konzepte`, 'ok');
    await loadMM();
  } catch { toast('Fehler beim Aufbauen','err'); if(st) st.textContent='Fehler'; }
  finally  { if(btn){btn.disabled=false; btn.innerHTML=`${IC.net} Aufbauen`;} }
}

function drawD3(data) {
  const svg    = d3.select('#mm-svg');
  const canvas = document.getElementById('mm-canvas');
  if (!svg.node()||!canvas) return;
  svg.selectAll('*').remove();
  if (mmSim) mmSim.stop();

  const w=canvas.clientWidth, h=canvas.clientHeight;
  const cc = d3.scaleOrdinal(d3.schemeTableau10);
  const g  = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.1,6]).on('zoom',e=>g.attr('transform',e.transform)));

  mmLinks = g.append('g').selectAll('line').data(data.links).join('line')
    .attr('stroke','#2d3148').attr('stroke-opacity',.55)
    .attr('stroke-width', d=>Math.max(.5, Math.sqrt(d.weight)*.75));

  mmNodes = g.append('g').selectAll('g').data(data.nodes).join('g')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) mmSim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) mmSim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click',(e,d)=>{
      e.stopPropagation();
      const nb = new Set([d.id]);
      mmLinks.each(l=>{ if(l.source.id===d.id) nb.add(l.target.id); if(l.target.id===d.id) nb.add(l.source.id); });
      mmNodes.attr('opacity', n=>nb.has(n.id)?1:.15);
      mmLinks.attr('stroke-opacity', l=>(l.source.id===d.id||l.target.id===d.id)?.85:.04);
    })
    .on('mouseover',(e,d)=>{
      const tip=document.getElementById('mm-tip');
      if(tip){ tip.innerHTML=`<strong>${d.name}</strong><br>Verbindungen: ${d.degree} · Cluster ${d.clusterId}`;
               tip.style.opacity=1; tip.style.left=(e.offsetX+14)+'px'; tip.style.top=(e.offsetY-10)+'px'; }
    })
    .on('mouseout',()=>{ const t=document.getElementById('mm-tip'); if(t) t.style.opacity=0; });

  svg.on('click',()=>{ mmNodes?.attr('opacity',1); mmLinks?.attr('stroke-opacity',.55); });

  mmNodes.append('circle')
    .attr('r', d=>5+Math.sqrt(d.degree)*3.5)
    .attr('fill', d=>cc(d.clusterId)).attr('fill-opacity',.88)
    .attr('stroke','#0d0f17').attr('stroke-width',2).style('cursor','pointer');

  mmNodes.append('text')
    .text(d=>d.name)
    .attr('dy', d=>-(8+Math.sqrt(d.degree)*3.5))
    .attr('text-anchor','middle').attr('fill','#b0bad0')
    .attr('font-size',11).attr('pointer-events','none');

  mmSim = d3.forceSimulation(data.nodes)
    .force('link',    d3.forceLink(data.links).id(d=>d.id).distance(95).strength(.38))
    .force('charge',  d3.forceManyBody().strength(-260))
    .force('center',  d3.forceCenter(w/2,h/2))
    .force('collide', d3.forceCollide(d=>13+Math.sqrt(d.degree)*4))
    .on('tick',()=>{
      mmLinks.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
             .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      mmNodes.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

function mmHighlight(q) {
  if (!mmNodes) return;
  const t = q.toLowerCase();
  mmNodes.attr('opacity', d=>!t||d.name.toLowerCase().includes(t)?1:.12);
}

async function drawFC(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Lernkarten</div><div class="view-sub">KI-generierte Flashcards · Leertaste zum Umdrehen</div></div>
      <div class="view-actions">
        <select class="form-select" id="fc-doc">
          <option value="">Dokument wählen…</option>${docOptions(S.fc.docId)}
        </select>
        <button class="btn btn-primary btn-sm" id="fc-gen">${IC.star} Generieren</button>
      </div>
    </div>
    <div class="view-body" style="display:flex;justify-content:center">
      <div id="fc-body" style="width:100%;max-width:600px"></div>
    </div>`;

  document.getElementById('fc-doc').onchange = async e=>{
    S.fc.docId = e.target.value ? +e.target.value : null;
    S.fc.idx=0; S.fc.flip=false;
    if (S.fc.docId) { S.fc.cards = await api.fc(S.fc.docId).catch(()=>[]); }
    else S.fc.cards=[];
    drawFCBody();
  };

  document.getElementById('fc-gen').onclick = async()=>{
    if (!S.fc.docId) { toast('Bitte erst ein Dokument wählen','inf'); return; }
    const btn = document.getElementById('fc-gen');
    btn.disabled=true; btn.innerHTML=`${spinner()} Generiert…`;
    try {
      const r = await api.genFc(S.fc.docId);
      toast(`${r.createdCards} Lernkarten erstellt`, 'ok');
      S.fc.cards = await api.fc(S.fc.docId); S.fc.idx=0; S.fc.flip=false; drawFCBody();
    } catch { toast('Fehler beim Generieren','err'); }
    finally { btn.disabled=false; btn.innerHTML=`${IC.star} Generieren`; }
  };

  if (S.fc.docId) { S.fc.cards = await api.fc(S.fc.docId).catch(()=>[]); }
  drawFCBody();

  document.onkeydown = e=>{
    if (S.view!=='fc') return;
    const c=S.fc.cards, i=S.fc.idx;
    if (e.key==='ArrowLeft'  && i>0)         { e.preventDefault(); S.fc.idx--; S.fc.flip=false; drawFCBody(); }
    if (e.key==='ArrowRight' && i<c.length-1){ e.preventDefault(); S.fc.idx++; S.fc.flip=false; drawFCBody(); }
    if (e.key===' ')                          { e.preventDefault(); S.fc.flip=!S.fc.flip; drawFCBody(); }
  };
}

function drawFCBody() {
  const body = document.getElementById('fc-body');
  if (!body) return;
  const cards = S.fc.cards;
  if (!cards.length) {
    body.innerHTML=`<div class="empty">${IC.card}<br><h3>Keine Lernkarten</h3>
      <p>Wähle ein Dokument und klicke auf „Generieren"</p></div>`;
    return;
  }
  const i=S.fc.idx, c=cards[i];
  body.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:22px;padding-top:8px">
      <div class="fc-scene">
        <div class="fc-card${S.fc.flip?' flipped':''}" id="fc-el">
          <div class="fc-face fc-front">
            <div class="fc-label">Frage</div>
            <div class="fc-text">${esc(c.question)}</div>
            <div class="fc-hint">Klicken oder Leertaste zum Umdrehen</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label">Antwort</div>
            <div class="fc-text">${esc(c.answer)}</div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="btn btn-ghost btn-sm" id="fc-prev"${i===0?' disabled':''}>← Zurück</button>
        <span class="fc-count">${i+1} / ${cards.length}</span>
        <button class="btn btn-ghost btn-sm" id="fc-next"${i===cards.length-1?' disabled':''}>Weiter →</button>
      </div>
      <div class="fc-dots">${cards.map((_,j)=>`<div class="fc-dot${j===i?' on':''}"></div>`).join('')}</div>
    </div>`;

  document.getElementById('fc-el').onclick  = ()=>{ S.fc.flip=!S.fc.flip; drawFCBody(); };
  document.getElementById('fc-prev')?.onclick = ()=>{ S.fc.idx--; S.fc.flip=false; drawFCBody(); };
  document.getElementById('fc-next')?.onclick = ()=>{ S.fc.idx++; S.fc.flip=false; drawFCBody(); };
}

async function drawSum(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Zusammenfassung</div><div class="view-sub">KI-generierte Zusammenfassungen deiner Skripte</div></div>
      <div class="view-actions">
        <select class="form-select" id="sum-doc">
          <option value="">Dokument wählen…</option>${docOptions(S.sum.docId)}
        </select>
        <button class="btn btn-primary btn-sm" id="sum-gen">${IC.star} Generieren</button>
      </div>
    </div>
    <div class="view-body">
      <div id="sum-body" style="max-width:700px"></div>
    </div>`;

  document.getElementById('sum-doc').onchange = async e=>{
    S.sum.docId = e.target.value ? +e.target.value : null;
    S.sum.text  = null;
    if (S.sum.docId) await loadSum();
    else drawSumBody();
  };

  document.getElementById('sum-gen').onclick = async()=>{
    if (!S.sum.docId) { toast('Bitte erst ein Dokument wählen','inf'); return; }
    const btn=document.getElementById('sum-gen');
    btn.disabled=true; btn.innerHTML=`${spinner()} Generiert…`;
    const body=document.getElementById('sum-body');
    if(body) body.innerHTML=`<div style="color:var(--dim);font-size:13px">Zusammenfassung wird erstellt…${pbar()}</div>`;
    try {
      const r = await api.genSum(S.sum.docId);
      S.sum.text = r.summary;
      drawSumBody();
      toast('Zusammenfassung erstellt','ok');
    } catch { toast('Fehler beim Generieren','err'); drawSumBody(); }
    finally { btn.disabled=false; btn.innerHTML=`${IC.star} Generieren`; }
  };

  if (S.sum.docId) await loadSum(); else drawSumBody();
}

async function loadSum() {
  const body=document.getElementById('sum-body');
  if(body) body.innerHTML=`<div style="color:var(--dim);font-size:13px">Lade…${pbar()}</div>`;
  try {
    S.sum.text = await api.sum(S.sum.docId);
    drawSumBody();
  } catch {
    S.sum.text=null; drawSumBody();
  }
}

function drawSumBody() {
  const body=document.getElementById('sum-body');
  if (!body) return;
  if (!S.sum.docId) {
    body.innerHTML=`<div class="empty">${IC.txt}<br><h3>Kein Dokument gewählt</h3>
      <p>Wähle ein Dokument oben oder generiere eine neue Zusammenfassung</p></div>`;
    return;
  }
  if (!S.sum.text) {
    body.innerHTML=`<div class="empty">${IC.txt}<br><h3>Noch keine Zusammenfassung</h3>
      <p>Klicke auf „Generieren" um eine zu erstellen</p></div>`;
    return;
  }
  const doc = S.docs.find(d=>d.id===S.sum.docId);
  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <span style="font-size:13px;font-weight:600;color:var(--primary-lt)">${esc(doc?.name||'')}</span>
      <span style="font-size:11px;color:var(--dim)">· Zusammenfassung</span>
    </div>
    <div class="card-lg">
      <p class="sum-text">${esc(S.sum.text)}</p>
    </div>`;
}

// ── Init ─────────────────────────────────────────────────────────────
async function init() {
  try { S.docs = await api.docs(); } catch {}
  go('docs');
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
