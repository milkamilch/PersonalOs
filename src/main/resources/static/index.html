<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LectureBase</title>
  <style>
    :root {
      --bg:           #0d0f17;
      --surface-1:    #12141c;
      --surface-2:    #1a1d27;
      --surface-3:    #242838;
      --border:       #2d3148;
      --border-light: #3d4468;
      --primary:      #7c3aed;
      --primary-h:    #6d28d9;
      --primary-lt:   #a78bfa;
      --primary-glow: rgba(124,58,237,.15);
      --text:         #e2e8f0;
      --muted:        #94a3b8;
      --dim:          #64748b;
      --success:      #10b981;
      --error:        #ef4444;
      --r:            10px;
      --r-sm:         6px;
      --r-lg:         14px;
      --t:            180ms ease;
      --sidebar:      220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; overflow: hidden; font-size: 14px; line-height: 1.5;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar); background: var(--surface-1);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      padding: 16px 10px; gap: 3px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px 18px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
    }
    .brand-icon {
      width: 30px; height: 30px; flex-shrink: 0;
      background: linear-gradient(135deg,#7c3aed,#a855f7);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .brand-name span { color: var(--primary-lt); }
    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 11px; border-radius: var(--r-sm);
      cursor: pointer; color: var(--muted); transition: all var(--t);
      font-size: 13px; font-weight: 500; border: 1px solid transparent;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active {
      background: var(--primary-glow); color: var(--primary-lt);
      border-color: rgba(124,58,237,.3);
    }
    .sidebar-footer {
      margin-top: auto; padding: 14px 10px 0;
      border-top: 1px solid var(--border);
      color: var(--dim); font-size: 11px;
    }

    /* ── Main ────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .view-header {
      padding: 18px 26px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface-1); display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .view-title  { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
    .view-sub    { color: var(--dim); font-size: 11px; margin-top: 1px; }
    .view-actions{ margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .view-body   { flex: 1; overflow-y: auto; padding: 22px 26px; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r-sm); border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all var(--t); line-height: 1;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-3); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Form ────────────────────────────────────────────── */
    .form-select, .form-input {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      padding: 6px 11px; font-size: 13px; outline: none; font-family: inherit;
    }
    .form-select:focus, .form-input:focus { border-color: var(--primary); }
    .form-input::placeholder { color: var(--dim); }

    /* ── Cards ───────────────────────────────────────────── */
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
    .card-lg {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }

    /* ── Tags ────────────────────────────────────────────── */
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500;
      background: rgba(124,58,237,.14); color: var(--primary-lt);
      border: 1px solid rgba(124,58,237,.22);
    }
    .tag-x {
      cursor: pointer; background: none; border: none; color: inherit;
      opacity: .6; padding: 0; font-size: 12px; line-height: 1;
    }
    .tag-x:hover { opacity: 1; }

    /* ── Upload bar ──────────────────────────────────────── */
    .upload-bar {
      display: flex; gap: 8px; align-items: stretch; margin-bottom: 16px;
    }
    #upload-zone {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 9px 16px; border: 2px dashed var(--border-light);
      border-radius: var(--r-sm); cursor: pointer; color: var(--muted);
      font-size: 13px; font-weight: 500; background: var(--surface-2);
      transition: all var(--t); white-space: nowrap;
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: var(--primary); color: var(--primary-lt); background: var(--primary-glow);
    }
    #upload-input { display: none; }
    #gdrive-url {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); padding: 0 12px;
      font-size: 13px; outline: none; transition: border-color var(--t);
    }
    #gdrive-url:focus { border-color: var(--primary); }
    #gdrive-url::placeholder { color: var(--dim); }
    #gdrive-import {
      display: flex; align-items: center; gap: 7px; white-space: nowrap; flex-shrink: 0;
    }
    .gdrive-logo { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Projects ───────────────────────────────────────── */
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .proj-card {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 18px; cursor: pointer;
      transition: border-color var(--t), transform var(--t);
      display: flex; flex-direction: column; gap: 10px;
    }
    .proj-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
    .proj-stripe { height: 4px; border-radius: 2px; margin-bottom: 2px; }
    .proj-name { font-size: 14px; font-weight: 600; }
    .proj-desc { font-size: 12px; color: var(--dim); line-height: 1.5; }
    .proj-stats { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-top: auto; }
    .proj-detail-section { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 14px; }
    .proj-detail-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    /* Todos */
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .todo-item:last-child { border-bottom: none; }
    .todo-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-light); appearance: none; cursor: pointer; flex-shrink: 0; }
    .todo-check:checked { background: var(--primary); border-color: var(--primary); }
    .todo-text { flex: 1; font-size: 13px; }
    .todo-text.done { text-decoration: line-through; color: var(--dim); }
    .todo-del { color: var(--dim); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px; }
    .todo-del:hover { color: var(--error); }
    /* Notes */
    .notes-ta { width: 100%; min-height: 140px; background: var(--surface-3); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 10px; font-size: 13px; line-height: 1.6; resize: vertical; font-family: inherit; }
    .notes-ta:focus { outline: none; border-color: var(--primary); }

    /* ── Doc list ────────────────────────────────────────── */
    .doc-list { display: flex; flex-direction: column; gap: 3px; }
    .doc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--r-sm);
      background: var(--surface-2); border: 1px solid var(--border);
      transition: border-color var(--t);
    }
    .doc-row:hover { border-color: var(--border-light); }
    .doc-icon  { flex-shrink: 0; color: var(--dim); }
    .doc-info  { flex: 1; min-width: 0; }
    .doc-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-date  { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .doc-tags-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; flex-shrink: 0; max-width: 220px; }
    .doc-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
    .dab {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px;
      border: 1px solid transparent; background: transparent;
      color: var(--muted); cursor: pointer; transition: all var(--t); font-size: 13px;
    }
    .dab:hover { background: var(--surface-3); color: var(--text); border-color: var(--border); }
    .dab-del   { color: #ef4444; }
    .dab-del:hover { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.25); color: #ef4444; }

    /* ── Chat ────────────────────────────────────────────── */
    #chat-wrap { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    #chat-bar  {
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      background: var(--surface-1); display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    }
    #messages  {
      flex: 1; overflow-y: auto; padding: 22px 18px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .msg { display: flex; gap: 11px; max-width: 760px; }
    .msg-user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
    }
    .msg-user .msg-avatar      { background: var(--primary); color: #fff; }
    .msg-assistant .msg-avatar { background: var(--surface-3); border: 1px solid var(--border); color: var(--primary-lt); }
    .msg-bubble {
      padding: 10px 14px; border-radius: 14px; line-height: 1.65; font-size: 13.5px;
    }
    .msg-user .msg-bubble      { background: var(--primary); color: #fff; border-bottom-right-radius: 3px; }
    .msg-assistant .msg-bubble { background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .sources { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .src-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      background: var(--surface-3); border: 1px solid var(--border); color: var(--muted);
    }
    #chat-input-area {
      padding: 14px 18px; border-top: 1px solid var(--border);
      background: var(--surface-1); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-ta {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); padding: 9px 13px;
      font-size: 13.5px; font-family: inherit; resize: none;
      min-height: 42px; max-height: 120px; outline: none; transition: border-color var(--t);
    }
    .chat-ta:focus { border-color: var(--primary); }

    /* ── Flashcards ──────────────────────────────────────── */
    .fc-scene { width: 540px; height: 300px; perspective: 1000px; }
    .fc-card  {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform .5s ease; cursor: pointer;
    }
    .fc-card.flipped { transform: rotateY(180deg); }
    .fc-face {
      position: absolute; inset: 0; backface-visibility: hidden;
      border-radius: 18px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
    }
    .fc-front { background: linear-gradient(135deg,#1a1d27,#242838); border: 1px solid var(--border-light); }
    .fc-back  { background: linear-gradient(135deg,#1e1240,#2a1b4e); border: 1px solid rgba(124,58,237,.4); transform: rotateY(180deg); }
    .fc-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }
    .fc-back .fc-label { color: var(--primary-lt); opacity: .7; }
    .fc-text  { font-size: 17px; font-weight: 500; line-height: 1.6; }
    .fc-hint  { font-size: 11px; color: var(--dim); margin-top: 14px; }
    .fc-nav   { display: flex; align-items: center; gap: 18px; }
    .fc-count { font-size: 13px; color: var(--dim); min-width: 56px; text-align: center; }
    .fc-dots  { display: flex; gap: 6px; }
    .fc-dot   { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background var(--t); }
    .fc-dot.on{ background: var(--primary); }

    /* ── Mind Map ────────────────────────────────────────── */
    #mm-view  { display: flex; flex-direction: column; height: 100%; }
    #mm-bar   {
      padding: 10px 18px; background: var(--surface-1); border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    }
    #mm-canvas{ flex: 1; position: relative; overflow: hidden; }
    #mm-canvas svg { width: 100%; height: 100%; }
    #mm-tip   {
      position: absolute; background: var(--surface-3); border: 1px solid var(--border-light);
      border-radius: var(--r); padding: 8px 12px; font-size: 12px;
      pointer-events: none; opacity: 0; transition: opacity .12s; max-width: 200px; z-index: 5;
    }
    /* Cluster legend */
    #mm-legend {
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      padding: 7px 18px; background: var(--surface-1); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #mm-legend:empty { display: none; }
    .mm-chip {
      display: flex; align-items: center; gap: 5px; padding: 3px 9px;
      border: 1px solid var(--border); border-radius: 12px; font-size: 11px;
      cursor: pointer; transition: all var(--t); color: var(--muted);
    }
    .mm-chip:hover { border-color: var(--border-light); color: var(--text); }
    .mm-chip.active { color: var(--text); border-color: currentColor; background: var(--surface-3); }
    .mm-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Detail panel */
    #mm-detail {
      position: absolute; top: 0; right: 0; bottom: 0; width: 310px;
      background: var(--surface-1); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 10;
      transform: translateX(100%); transition: transform .22s ease;
    }
    #mm-detail.open { transform: none; }
    .det-head {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 8px; flex-shrink: 0;
    }
    .det-head h3  { font-size: 14px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
    .det-head p   { font-size: 11px; color: var(--dim); }
    .det-docs     { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .det-close    {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 2px; flex-shrink: 0;
    }
    .det-close:hover { color: var(--text); }
    .det-body     { flex: 1; overflow-y: auto; padding: 12px; }
    .det-section  { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin: 12px 0 6px; }
    .det-excerpt  {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 6px;
    }
    .det-excerpt .det-src { font-size: 11px; color: var(--primary-lt); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
    .det-excerpt .det-text{ font-size: 12px; line-height: 1.65; color: var(--muted); }
    .search-wrap {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 6px 11px;
    }
    .search-wrap input {
      background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 170px;
    }
    .search-wrap input::placeholder { color: var(--dim); }

    /* ── Summary ─────────────────────────────────────────── */
    .sum-text { line-height: 1.85; font-size: 14.5px; white-space: pre-line; color: var(--text); }

    /* ── Empty / spinner / progress ──────────────────────── */
    .empty {
      text-align: center; padding: 56px 20px; color: var(--dim);
    }
    .empty svg { margin-bottom: 14px; opacity: .35; }
    .empty h3  { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .empty p   { font-size: 12px; }
    .spinner   {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
      border-radius: 50%; animation: spin .55s linear infinite; vertical-align: middle;
    }
    .pbar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .pfill{ height: 100%; background: var(--primary); border-radius: 3px; animation: prog 1.4s ease infinite; transition: width .3s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes prog {
      0%   { width:0%;  margin-left:0;    }
      50%  { width:55%; margin-left:22%;  }
      100% { width:0%;  margin-left:100%; }
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 22px; right: 22px; z-index: 999;
      display: flex; flex-direction: column; gap: 7px;
    }
    .toast {
      padding: 9px 15px; border-radius: var(--r); font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      animation: tslide .18s ease; box-shadow: 0 4px 18px rgba(0,0,0,.45);
    }
    .t-ok  { background:#064e3b; color:#a7f3d0; border:1px solid #065f46; }
    .t-err { background:#450a0a; color:#fca5a5; border:1px solid #7f1d1d; }
    .t-inf { background:#1e1b4b; color:#c4b5fd; border:1px solid #3730a3; }
    @keyframes tslide { from { transform:translateX(110%);opacity:0; } to { transform:none;opacity:1; } }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="brand">
    <div class="brand-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <span class="brand-name">Lecture<span>Base</span></span>
  </div>

  <div class="nav-item active" onclick="go('projects')" id="nav-projects">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>

  </div>

  <div class="nav-item" onclick="go('docs')" id="nav-docs">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
    </svg>Dokumente
  </div>

  <div class="nav-item" onclick="go('chat')" id="nav-chat">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>KI-Chat
  </div>

  <div class="nav-item" onclick="go('mm')" id="nav-mm">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/>
      <circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/>
      <line x1="6" y1="6.5" x2="9" y2="11"/><line x1="18" y1="6.5" x2="15" y2="11"/>
      <line x1="6" y1="17.5" x2="9" y2="13"/><line x1="18" y1="17.5" x2="15" y2="13"/>
    </svg>Mind Map
  </div>

  <div class="nav-item" onclick="go('fc')" id="nav-fc">

// ── State ────────────────────────────────────────────────────────────
const S = {
  view: 'docs', docs: [], semantic: false, dueCounts: {}, examDates: {},
  chat: { msgs: [], sid: null, docId: null, busy: false },

  dash:     { stats: null },

};

// ── API ──────────────────────────────────────────────────────────────
const api = {
  async req(url, o={}) {
    const r = await fetch(url, o);
    if (!r.ok) {
      if (r.status === 429) {
        const body = await r.json().catch(()=>({}));
        const sec  = body.retryAfter || 60;
        toast(`Gemini Rate-Limit – bitte in ${sec}s erneut versuchen`, 'err', 8000);
        throw Object.assign(new Error('RATE_LIMIT'), {retryAfter: sec});
      }
      const errBody = await r.json().catch(()=>({}));
      throw Object.assign(new Error(errBody.error || String(r.status)), {status: r.status, body: errBody});
    }
    const ct = r.headers.get('content-type')||'';
    return ct.includes('json') ? r.json() : r.text();
  },
  docs:       ()        => api.req('/api/documents'),
  upload:     fd        => api.req('/api/upload', {method:'POST', body:fd}),
  ask:        b         => api.req('/api/ask', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}),
  mm:         ()        => api.req('/api/mindmap'),
  buildMm:    (id,rb)   => api.req(`/api/mindmap/build${id?'?documentId='+id:'?'}${id?'&':''}rebuild=${!!rb}`, {method:'POST'}),
  fc:         id        => api.req(`/api/flashcards${id?'?documentId='+id:''}`),
  genFc:      id        => api.req(`/api/flashcards/generate?documentId=${id}`, {method:'POST'}),
  rateCard:   (id,known)=> api.req(`/api/flashcards/${id}/rate?known=${known}`, {method:'POST'}),
  resetCards: id        => api.req(`/api/flashcards/reset?documentId=${id}`, {method:'POST'}),
  sum:        id        => api.req(`/api/summaries/${id}`),
  genSum:     (id,rb)   => api.req(`/api/summaries/generate?documentId=${id}&rebuild=${!!rb}`, {method:'POST'}),
  addTags:    (id,tags) => api.req(`/api/documents/${id}/tags`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(tags)}),
  delTag:     (id,tag)  => api.req(`/api/documents/${id}/tags/${encodeURIComponent(tag)}`, {method:'DELETE'}),
  deleteDoc:  id        => api.req(`/api/documents/${id}`, {method:'DELETE'}),
  gdrive:     url       => api.req('/api/upload/gdrive', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url})}),
  status:     ()        => api.req('/api/status'),
  sessions:   ()        => api.req('/api/chat/sessions'),
  sessionMsgs:id        => api.req(`/api/chat/sessions/${id}/messages`),
  exportFc:   id        => `/api/export/flashcards/${id}`,
  dueCounts:  ()        => api.req('/api/flashcards/due-counts'),
  fcDue:      id        => api.req(`/api/flashcards/due?documentId=${id}`),
  examDates:  ()        => api.req('/api/exam-dates'),
  setExam:    (id,date) => api.req(`/api/exam-dates?documentId=${id}&date=${date}`, {method:'POST'}),
  delExam:    id        => api.req(`/api/exam-dates/${id}`, {method:'DELETE'}),
  stats:      ()        => api.req('/api/stats'),
  projects:   ()        => api.req('/api/projects'),
  createProj: (n,d,c)  => api.req(`/api/projects`, {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`name=${encodeURIComponent(n)}&description=${encodeURIComponent(d||'')}&color=${encodeURIComponent(c||'#7c3aed')}`}),
  updateProj: (id,n,d,c)=> api.req(`/api/projects/${id}`, {method:'PUT', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`name=${encodeURIComponent(n)}&description=${encodeURIComponent(d||'')}&color=${encodeURIComponent(c||'#7c3aed')}`}),
  deleteProj: id        => api.req(`/api/projects/${id}`, {method:'DELETE'}),
  projDocs:   id        => api.req(`/api/projects/${id}/documents`),
  addProjDoc: (pid,did) => api.req(`/api/projects/${pid}/documents?documentId=${did}`, {method:'POST'}),
  remProjDoc: (pid,did) => api.req(`/api/projects/${pid}/documents/${did}`, {method:'DELETE'}),
  projNotes:  id        => api.req(`/api/projects/${id}/notes`),
  saveProjNotes:(id,c)  => api.req(`/api/projects/${id}/notes`, {method:'POST', headers:{'Content-Type':'text/plain'}, body:c}),
  todos:      pid       => api.req(`/api/todos${pid!=null?'?projectId='+pid:''}`),
  createTodo: (pid,txt) => api.req(`/api/todos?text=${encodeURIComponent(txt)}${pid!=null?'&projectId='+pid:''}`, {method:'POST'}),
  doneTodo:   (id,done) => api.req(`/api/todos/${id}/done?done=${done}`, {method:'POST'}),
  deleteTodo: id        => api.req(`/api/todos/${id}`, {method:'DELETE'}),
  quiz:       concepts  => api.req('/api/mindmap/quiz', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(concepts)}),
  glossary:   id        => `/api/export/glossary${id?'?documentId='+id:''}`,
};

// ── Helpers ──────────────────────────────────────────────────────────
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const main = () => document.getElementById('main');

function toast(msg, type='inf', duration=3600) {
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<span>${{ok:'✓',err:'✕',inf:'ℹ'}[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), duration);
}

function spinner() { return `<span class="spinner"></span>`; }
function pbar(pct, label) {
  const style = pct != null ? `width:${pct}%;animation:none` : '';
  const lbl = label ? `<div style="font-size:11px;color:var(--dim);margin-top:4px">${esc(label)}</div>` : '';
  return `<div class="pbar"><div class="pfill" style="${style}"></div></div>${lbl}`;
}

function docOptions(selId) {
  return S.docs.map(d=>`<option value="${d.id}"${d.id==selId?' selected':''}>${esc(cleanName(d.name))}</option>`).join('');
}

function cleanName(raw) {
  return (raw || '').replace(/^lb_\d+_/, '');
}

// ── Router ───────────────────────────────────────────────────────────
function go(view) {
  S.view = view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`nav-${view}`)?.classList.add('active');
  draw();
}

function draw() {
  const el = main(); el.innerHTML='';
  if (S.view==='docs') drawDocs(el);
  else if (S.view==='chat') drawChat(el);
  else if (S.view==='mm')   drawMM(el);
  else if (S.view==='fc')   drawFC(el);
  else if (S.view==='sum')  drawSum(el);
  else if (S.view==='dash')     drawDashboard(el);
  else if (S.view==='projects') drawProjects(el);
}

// ═══════════════════════════════════════════════════════════════════
// VIEW: DOCUMENTS
// ═══════════════════════════════════════════════════════════════════
function drawDocs(el) {
  el.innerHTML = `
    <div class="view-header">
      <div>
        <div class="view-title">Dokumente</div>
        <div class="view-sub">${S.docs.length ? S.docs.length + ' Skript' + (S.docs.length !== 1 ? 'e' : '') : 'Noch keine Skripte'}</div>
      </div>
    </div>
    <div class="view-body">
      <div class="upload-bar">
        <div id="upload-zone">
          <input type="file" id="upload-input" accept=".pdf,.docx" multiple>
          <input type="file" id="folder-input" webkitdirectory style="display:none">
          ${IC.up} PDF / DOCX hochladen
        </div>
        <button class="btn btn-ghost btn-sm" id="folder-btn" title="Ganzen Ordner importieren" style="white-space:nowrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Ordner
        </button>
        <input id="gdrive-url" type="text" placeholder="Google Drive Link (Datei oder Ordner)…">
        <button class="btn btn-ghost" id="gdrive-import">
          <svg class="gdrive-logo" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
            <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
            <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
            <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
            <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
            <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
            <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
          </svg>
          Importieren
        </button>
      </div>
      <div id="up-prog" style="display:none;margin-bottom:12px">${pbar()}</div>
      <div id="doc-grid"></div>
    </div>`;

  const zone   = document.getElementById('upload-zone');
  const input  = document.getElementById('upload-input');
  const fInput = document.getElementById('folder-input');
  zone.addEventListener('click', ()=>input.click());
  zone.addEventListener('dragover', e=>{e.preventDefault(); zone.classList.add('drag-over');});
  zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop', async e=>{
    e.preventDefault(); zone.classList.remove('drag-over');
    const items = [...(e.dataTransfer.items||[])];
    if (items.length && items[0]?.webkitGetAsEntry) {
      const entries = items.map(i=>i.webkitGetAsEntry()).filter(Boolean);
      const allFiles = (await Promise.all(entries.map(collectEntryFiles))).flat();
      const supported = allFiles.filter(f=>/\.(pdf|docx)$/i.test(f.name));
      if (!supported.length) { toast('Keine PDF- oder DOCX-Dateien gefunden', 'inf'); return; }
      doUpload(supported);
    } else {
      doUpload(e.dataTransfer.files);
    }
  });
  input.addEventListener('change', ()=>doUpload(input.files));
  fInput.addEventListener('change', ()=>{
    const files = [...fInput.files].filter(f=>/\.(pdf|docx)$/i.test(f.name));
    if (!files.length) { toast('Keine PDF- oder DOCX-Dateien im Ordner', 'inf'); return; }
    toast(`${files.length} Datei${files.length!==1?'en':''} gefunden`, 'inf');
    doUpload(files);
  });
  document.getElementById('folder-btn').addEventListener('click', ()=>fInput.click());

  document.getElementById('gdrive-import').addEventListener('click', doGdriveImport);
  document.getElementById('gdrive-url').addEventListener('keydown', e=>{ if(e.key==='Enter') doGdriveImport(); });

  renderDocGrid();
}

async function collectEntryFiles(entry) {
  if (!entry) return [];
  if (entry.isFile) return new Promise(res => entry.file(f => res([f]), ()=>res([])));
  const reader = entry.createReader();
  const allEntries = await new Promise(res => {
    const results = [];
    function read() {
      reader.readEntries(batch => {
        if (!batch.length) { res(results); return; }
        results.push(...batch); read();
      }, ()=>res(results));
    }
    read();
  });
  const nested = await Promise.all(allEntries.map(collectEntryFiles));
  return nested.flat();
}

async function doUpload(files) {
  const list = [...files].filter(f=>/\.(pdf|docx)$/i.test(f.name));
  if (!list.length) { toast('Nur PDF und DOCX werden unterstützt', 'inf'); return; }
  const prog = document.getElementById('up-prog');
  const total = list.length;
  let done = 0, ok = 0;
  if (prog) { prog.style.display='block'; prog.innerHTML=pbar(0); }
  for (const f of list) {
    const fd = new FormData(); fd.append('file', f);
    try {
      const r = await api.upload(fd);
      if (r.duplicate) {
        toast(`„${cleanName(r.existingName)}" bereits vorhanden – übersprungen`, 'inf');
      } else {
        ok++;
        toast(`„${cleanName(r.name)}" · ${r.chunks} Chunks`, 'ok');
      }
    } catch(e) {
      if (e?.status === 409) {
        toast(`„${f.name}" ist ein Duplikat – übersprungen`, 'inf');
      } else {
        toast(`Fehler: ${f.name}`, 'err');
      }
    }
    done++;
    if (prog) prog.innerHTML = pbar(Math.round(done/total*100), `${done}/${total} Dateien`);
  }
  if (prog) prog.style.display='none';
  S.docs = await api.docs().catch(()=>S.docs);
  renderDocGrid();
  if (total > 1) toast(`${ok} von ${total} Dateien erfolgreich importiert`, ok===total?'ok':'inf');
}

async function doGdriveImport() {
  const inp = document.getElementById('gdrive-url');
  const btn = document.getElementById('gdrive-import');
  const url = inp?.value.trim();
  if (!url) { toast('Bitte einen Google Drive Link einfügen', 'err'); return; }
  if (btn) { btn.disabled=true; btn.innerHTML=`${spinner()} Importiere…`; }
  try {
    const r = await api.gdrive(url);
    if (r.results) {
      // Ordner-Import
      const ok = r.results.length;
      toast(`${ok} von ${r.total} Dateien aus Ordner importiert`, ok===r.total?'ok':'inf');
      if (r.errors?.length) r.errors.forEach(e => toast(e, 'err'));
    } else {
      toast(`„${cleanName(r.name)}" importiert`, 'ok');
    }
    if (inp) inp.value = '';
    S.docs = await api.docs().catch(()=>S.docs);
    renderDocGrid();
  } catch(e) {
    const msg = e?.message || '';
    if (msg.includes('GOOGLE_DRIVE_API_KEY') || msg.includes('API-Key')) {
      toast('Ordner-Import benötigt GOOGLE_DRIVE_API_KEY in .env', 'err');
    } else {
      toast('Import fehlgeschlagen – Link öffentlich geteilt?', 'err');
    }
  } finally {
    if (btn) { btn.disabled=false; btn.innerHTML=`<svg class="gdrive-logo" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg> Importieren`; }
  }
}

function renderDocGrid() {
  const grid = document.getElementById('doc-grid');
  if (!grid) return;
  if (!S.docs.length) {
    grid.innerHTML = `<div class="empty">${IC.doc}<br><h3>Noch keine Dokumente</h3>
      <p>PDF oder DOCX hochladen oder Google Drive Link einfügen</p></div>`;
    return;
  }
  grid.innerHTML = `<div class="doc-list">${S.docs.map(docCard).join('')}</div>`;

  grid.querySelectorAll('.tag-x').forEach(btn=>btn.addEventListener('click', async e=>{
    const {id, tag} = e.currentTarget.dataset;
    await api.delTag(id, tag).catch(()=>{});
    S.docs = await api.docs().catch(()=>S.docs); renderDocGrid();
  }));

  grid.querySelectorAll('.tag-in').forEach(inp=>inp.addEventListener('keydown', async e=>{
    if (e.key!=='Enter' || !inp.value.trim()) return;
    await api.addTags(inp.dataset.id, [inp.value.trim()]).catch(()=>{});
    inp.value='';
    S.docs = await api.docs().catch(()=>S.docs); renderDocGrid();
  }));

  grid.querySelectorAll('[data-act]').forEach(btn=>btn.addEventListener('click', async e=>{
    const {act, id} = e.currentTarget.dataset;
    if (act==='chat') { S.chat.docId=+id; go('chat'); }
    if (act==='sum')  { S.sum.docId=+id;  go('sum');  }
    if (act==='fc')   { S.fc.docId=+id; S.fc.idx=0; S.fc.flip=false; go('fc'); }
    if (act==='mm')   { go('mm'); setTimeout(()=>triggerBuildMM(+id), 200); }
    if (act==='exam') {
      const existing = S.examDates[+id];
      const val = prompt('Prüfungsdatum (YYYY-MM-DD):', existing?.examDate || new Date().toISOString().slice(0,10));
      if (val === null) return;
      if (val === '') {
        await api.delExam(+id).catch(()=>{});
        delete S.examDates[+id];
        toast('Prüfungstermin entfernt', 'ok');
      } else {
        const r = await api.setExam(+id, val).catch(()=>null);
        if (r) { S.examDates[+id] = r; toast(`Prüfung am ${val}`, 'ok'); }
        else     toast('Ungültiges Datum', 'err');
      }
      renderDocGrid();
    }
    if (act==='del') {
      const doc = S.docs.find(d=>d.id===+id);
      if (!confirm(`„${cleanName(doc?.name||'Dokument')}" löschen?\nLernkarten und Zusammenfassungen werden ebenfalls gelöscht.`)) return;
      try {
        await api.deleteDoc(+id);
        toast('Dokument gelöscht', 'ok');
        S.docs = await api.docs().catch(()=>S.docs);
        renderDocGrid();
      } catch { toast('Fehler beim Löschen', 'err'); }
    }
  }));
}

function docCard(d) {
  const name  = cleanName(d.name);
  const tags  = (d.tags||[]).map(t=>
    `<span class="tag">${esc(t)}<button class="tag-x" data-id="${d.id}" data-tag="${esc(t)}">×</button></span>`
  ).join('');
  const date  = d.uploadedAt ? new Date(d.uploadedAt).toLocaleDateString('de',{day:'2-digit',month:'short',year:'numeric'}) : '';
  const due   = S.dueCounts[d.id] || 0;
  const exam  = S.examDates[d.id];
  const dueBadge = due > 0
    ? `<span style="font-size:10px;background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;border-radius:8px;padding:1px 7px;margin-left:6px">${due} fällig</span>` : '';
  const examBadge = exam
    ? (() => {
        const d = exam.daysLeft;
        const col = d <= 3 ? '#ef4444' : d <= 7 ? '#f59e0b' : 'var(--primary-lt)';
        return `<span style="font-size:10px;background:${col}22;color:${col};border:1px solid ${col}44;border-radius:8px;padding:1px 7px;margin-left:6px" title="Prüfung am ${exam.examDate}">📅 ${d === 0 ? 'heute' : d < 0 ? 'vergangen' : `${d}d`}</span>`;
      })() : '';

  return `<div class="doc-row">
    <svg class="doc-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
    </svg>
    <div class="doc-info">
      <div class="doc-title" title="${esc(d.name)}">${esc(name)}${dueBadge}${examBadge}</div>
      ${date?`<div class="doc-date">${date}</div>`:''}
    </div>
    <div class="doc-tags-row">
      ${tags}
      <input class="form-input tag-in" data-id="${d.id}" style="padding:2px 7px;font-size:11px;width:64px;min-width:0" placeholder="+ Tag">
    </div>
    <div class="doc-actions">
      <button class="dab" data-act="chat" data-id="${d.id}" title="KI-Chat">${IC.chat}</button>
      <button class="dab" data-act="sum"  data-id="${d.id}" title="Zusammenfassung">${IC.txt}</button>
      <button class="dab" data-act="fc"   data-id="${d.id}" title="Lernkarten">${IC.card}</button>
      <button class="dab" data-act="mm"   data-id="${d.id}" title="Mind Map">${IC.net}</button>
      <button class="dab" data-act="exam" data-id="${d.id}" title="${exam?'Prüfungstermin ändern':'Prüfungstermin setzen'}" style="${exam?'color:var(--primary-lt)':''}">📅</button>
      <button class="dab dab-del" data-act="del" data-id="${d.id}" title="Löschen">✕</button>
    </div>
  </div>`;
}

function drawChat(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">KI-Chat</div><div class="view-sub">Fragen zu deinen Skripten stellen</div></div>
      <div class="view-actions">
        <button class="btn btn-ghost btn-sm" onclick="newChat()">Neue Sitzung</button>
        <button class="btn btn-ghost btn-sm" id="btn-exp" onclick="exportChat()" style="${S.chat.sid?'':'display:none'}">${IC.exp} Export</button>
      </div>
    </div>
    <div id="chat-wrap">
      <div id="chat-bar">
        <span style="font-size:11px;color:var(--dim)">Dokument:</span>
        <select class="form-select" id="chat-doc" style="font-size:12px">
          <option value="">Alle</option>${docOptions(S.chat.docId)}
        </select>
        <span style="font-size:11px;padding:3px 8px;border-radius:4px;margin-left:auto;${S.semantic?'background:#7c3aed22;color:var(--primary-lt)':'background:var(--surface-3);color:var(--dim)'}">${S.semantic?'⚡ Semantische Suche':'Keyword-Suche'}</span>
      </div>
      <div id="messages">${buildMsgs()}</div>
      <div id="chat-input-area">
        <div class="input-row">
          <textarea class="chat-ta" id="chat-in" placeholder="Frage eingeben… (Enter zum Senden, Shift+Enter für Zeilenumbruch)" rows="1"></textarea>
          <button class="btn btn-primary" onclick="sendMsg()">${IC.send}</button>
        </div>
      </div>
    </div>`;

  const ta = document.getElementById('chat-in');
  ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
  ta.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
  document.getElementById('chat-doc').addEventListener('change', e=>{ S.chat.docId = e.target.value ? +e.target.value : null; });
  scrollMsgs();
}

function buildMsgs() {
  if (!S.chat.msgs.length) return `<div class="empty">
    ${IC.chat}<br><h3>Noch keine Nachrichten</h3>
    <p>Stelle eine Frage zu deinen Vorlesungsskripten</p></div>`;
  return S.chat.msgs.map(m => {
    if (m.role==='user') return `
      <div class="msg msg-user">
        <div class="msg-avatar">Du</div>
        <div><div class="msg-bubble">${esc(m.content)}</div></div>
      </div>`;
    const srcs = (m.sources||[]).length
      ? `<div class="sources">${m.sources.map(s=>`<span class="src-chip">${IC.doc} Seite ${s.page}</span>`).join('')}</div>`
      : '';
    return `
      <div class="msg msg-assistant">
        <div class="msg-avatar">AI</div>
        <div><div class="msg-bubble">${esc(m.content)}</div>${srcs}</div>
      </div>`;
  }).join('');
}

function scrollMsgs() { const el=document.getElementById('messages'); if(el) setTimeout(()=>el.scrollTop=el.scrollHeight,40); }

async function sendMsg() {
  const ta   = document.getElementById('chat-in');
  const text = ta?.value.trim();
  if (!text || S.chat.busy) return;
  S.chat.busy = true;
  S.chat.msgs.push({role:'user', content:text});
  ta.value=''; ta.style.height='auto';

  const msgs = document.getElementById('messages');
  if (msgs) {
    msgs.innerHTML = buildMsgs();
    msgs.insertAdjacentHTML('beforeend',`
      <div class="msg msg-assistant" id="thinking">
        <div class="msg-avatar">AI</div>
        <div class="msg-bubble" style="color:var(--dim)">${spinner()} Denkt nach…</div>
      </div>`);
    scrollMsgs();
  }
  try {
    const r = await api.ask({ question:text, tag:null, sessionId:S.chat.sid||null });
    S.chat.sid = r.sessionId;
    S.chat.msgs.push({role:'assistant', content:r.answer, sources:r.sources});
    document.getElementById('btn-exp')?.style.removeProperty('display');
  } catch {
    S.chat.msgs.push({role:'assistant', content:'Fehler beim Abrufen der Antwort.', sources:[]});
    toast('Fehler beim KI-Chat', 'err');
  } finally {
    S.chat.busy = false;
    const m2 = document.getElementById('messages');
    if (m2) { m2.innerHTML = buildMsgs(); scrollMsgs(); }
  }
}

function newChat()  { S.chat.msgs=[]; S.chat.sid=null; draw(); }
function exportChat(){ if(S.chat.sid) window.open(`/api/export/${S.chat.sid}?format=markdown`,'_blank'); }

let mmSim, mmLinks, mmNodes, mmCc, mmData;

function drawMM(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Mind Map</div><div class="view-sub">Konzepte &amp; Cluster visualisieren</div></div>
    </div>
    <div id="mm-view">
      <div id="mm-bar">
        <select class="form-select" id="mm-doc" style="font-size:12px">
          <option value="">Alle Dokumente</option>${docOptions(null)}
        </select>
        <button class="btn btn-primary btn-sm" id="mm-build"  >${IC.net} Aufbauen</button>
        <button class="btn btn-ghost btn-sm"   id="mm-rebuild">${IC.ref} Neu erstellen</button>
        <button class="btn btn-ghost btn-sm"   id="mm-ref"    >${IC.ref} Aktualisieren</button>
        <button class="btn btn-ghost btn-sm"   id="mm-glossar">${IC.exp} Glossar</button>
        <div class="search-wrap">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="mm-search" placeholder="Konzept suchen…">
        </div>
        <span id="mm-status" style="font-size:12px;color:var(--dim);margin-left:auto">–</span>
      </div>
      <div id="mm-legend"></div>
      <div id="mm-canvas">
        <svg id="mm-svg"></svg>
        <div id="mm-tip"></div>
        <div id="mm-detail">
          <div class="det-head">
            <div style="flex:1"><p style="color:var(--dim);font-size:12px">Auf einen Knoten klicken</p></div>
          </div>
          <div class="det-body"></div>
        </div>
      </div>
    </div>`;

  document.getElementById('mm-build').onclick = ()=>{
    const id = document.getElementById('mm-doc').value;
    triggerBuildMM(id ? +id : null, false);
  };
  document.getElementById('mm-rebuild').onclick = ()=>{
    const id = document.getElementById('mm-doc').value;
    triggerBuildMM(id ? +id : null, true);
  };
  document.getElementById('mm-ref').onclick    = loadMM;
  document.getElementById('mm-glossar').onclick = ()=>{
    const docId = document.getElementById('mm-doc')?.value || null;
    window.open(api.glossary(docId || null), '_blank');
  };
  document.getElementById('mm-search').oninput = function(){ mmHighlight(this.value); };
  loadMM();
}

async function loadMM() {
  const st = document.getElementById('mm-status');
  if (st) st.textContent='Lade…';
  try {
    const data = await api.mm();
    if (!data.nodes?.length) { if(st) st.textContent='Keine Konzepte – erst „Aufbauen" klicken'; return; }
    if (st) st.textContent=`${data.nodes.length} Konzepte · ${data.links.length} Verbindungen`;
    mmData = data;
    S.mm.excerpts = {};
    drawD3(data);
    drawClusterLegend(data.nodes);
  } catch { if(st) st.textContent='Fehler beim Laden'; }
}

async function triggerBuildMM(docId, rebuild=false) {
  const btn = document.getElementById('mm-build');
  const rb  = document.getElementById('mm-rebuild');
  const st  = document.getElementById('mm-status');
  [btn,rb].forEach(b=>b&&(b.disabled=true));
  if (btn) btn.textContent='Verarbeite…';

  const url = `/api/mindmap/build-stream?rebuild=${rebuild}${docId?'&documentId='+docId:''}`;
  const es  = new EventSource(url);

  es.addEventListener('progress', e => {
    const d = JSON.parse(e.data);
    if (d.totalBatches === 0) return;
    const pct = Math.round(d.batch / d.totalBatches * 100);
    if (st) st.innerHTML =
      `<div style="margin-bottom:4px;font-size:12px;color:var(--dim)">Batch ${d.batch}/${d.totalBatches} · ${d.extractedConcepts} Konzepte</div>
       <div style="height:4px;background:var(--border);border-radius:2px">
         <div style="height:100%;width:${pct}%;background:var(--primary);border-radius:2px;transition:width .3s"></div></div>`;
  });

  es.addEventListener('done', async e => {
    es.close();
    const r = JSON.parse(e.data);
    if (st) st.textContent = '';
    if (r.cached) toast(`Aus Cache geladen · ${r.extractedConcepts} Konzepte`, 'inf');
    else          toast(`${r.processedChunks} Chunks · ${r.extractedConcepts} Konzepte`, 'ok');
    await loadMM();
    [btn,rb].forEach(b=>b&&(b.disabled=false));
    if (btn) btn.innerHTML=`${IC.net} Aufbauen`;
  });

  es.addEventListener('error', () => {
    es.close();
    toast('Fehler beim Aufbauen', 'err');
    if (st) st.textContent = '';
    [btn,rb].forEach(b=>b&&(b.disabled=false));
    if (btn) btn.innerHTML=`${IC.net} Aufbauen`;
  });
}

function drawD3(data) {
  const svg    = d3.select('#mm-svg');
  const canvas = document.getElementById('mm-canvas');
  if (!svg.node()||!canvas) return;
  svg.selectAll('*').remove();
  if (mmSim) mmSim.stop();

  const w = canvas.clientWidth, h = canvas.clientHeight;
  mmCc = d3.scaleOrdinal(d3.schemeTableau10);
  const cc = mmCc;
  const g  = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.08, 8]).on('zoom', e => g.attr('transform', e.transform)));

  // Log scale radius: compresses extreme degree values, max ~22px
  const r  = d => Math.min(22, 5 + Math.log1p(d.degree) * 3.8);
  // Font: slightly larger for hubs, smaller for periphery
  const fs = d => Math.max(9, Math.min(13, 8.5 + Math.log1p(d.degree) * 0.75));

  // Links — lighter stroke, log-scaled width
  mmLinks = g.append('g').selectAll('line').data(data.links).join('line')
    .attr('stroke', '#3d4468')
    .attr('stroke-opacity', .45)
    .attr('stroke-width', d => Math.max(.5, Math.log1p(d.weight) * .65));

  // Node groups
  mmNodes = g.append('g').selectAll('g').data(data.nodes).join('g')
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) mmSim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) mmSim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e,d) => {
      e.stopPropagation();
      const nb = new Set([d.id]);
      mmLinks.each(l => { if(l.source.id===d.id) nb.add(l.target.id); if(l.target.id===d.id) nb.add(l.source.id); });
      mmNodes.attr('opacity', n => nb.has(n.id) ? 1 : .08);
      mmLinks.attr('stroke-opacity', l => (l.source.id===d.id||l.target.id===d.id) ? .9 : .03);
      showConceptDetail(d);
    })
    .on('mouseover', (e,d) => {
      const tip = document.getElementById('mm-tip');
      if (!tip) return;
      const docs = (d.documents||[]).map(n=>cleanName(n)).join(', ');
      tip.innerHTML = `<strong style="font-size:13px">${esc(d.name)}</strong>
        <div style="color:var(--dim);font-size:11px;margin-top:3px">${d.degree} Verbindungen</div>
        ${docs ? `<div style="color:var(--primary-lt);font-size:11px;margin-top:4px">${IC.doc} ${esc(docs)}</div>` : ''}`;
      tip.style.opacity=1; tip.style.left=(e.offsetX+14)+'px'; tip.style.top=(e.offsetY-10)+'px';
    })
    .on('mouseout', () => { const t=document.getElementById('mm-tip'); if(t) t.style.opacity=0; });

  svg.on('click', () => {
    S.mm.activeCluster = null;
    mmNodes?.attr('opacity',1);
    mmLinks?.attr('stroke-opacity',.45);
    document.getElementById('mm-detail')?.classList.remove('open');
    document.querySelectorAll('.mm-chip').forEach(c=>c.classList.remove('active'));
  });

  // Circles with cluster-colored border
  mmNodes.append('circle')
    .attr('r', r)
    .attr('fill', d => cc(d.clusterId))
    .attr('fill-opacity', .82)
    .attr('stroke', d => { const c=d3.color(cc(d.clusterId)); return c ? c.darker(1.8).toString() : '#0d0f17'; })
    .attr('stroke-width', 1.5)
    .style('cursor', 'pointer');

  // Label: dark stroke pass (legibility halo)
  mmNodes.append('text')
    .text(d => d.name)
    .attr('dy', d => -(r(d) + 4))
    .attr('text-anchor', 'middle')
    .attr('fill', 'none')
    .attr('stroke', '#0a0c14')
    .attr('stroke-width', 4)
    .attr('stroke-linejoin', 'round')
    .attr('font-size', fs)
    .attr('font-family', 'inherit')
    .attr('pointer-events', 'none');

  // Label: text fill pass
  mmNodes.append('text')
    .text(d => d.name)
    .attr('dy', d => -(r(d) + 4))
    .attr('text-anchor', 'middle')
    .attr('fill', d => d.degree > 6 ? '#e2e8f0' : '#94a3b8')
    .attr('font-size', fs)
    .attr('font-weight', d => d.degree > 8 ? '600' : '400')
    .attr('font-family', 'inherit')
    .attr('pointer-events', 'none');

  // Force simulation — stronger repulsion, better spacing
  mmSim = d3.forceSimulation(data.nodes)
    .force('link',    d3.forceLink(data.links).id(d=>d.id).distance(110).strength(.22))
    .force('charge',  d3.forceManyBody().strength(-520).distanceMax(400))
    .force('center',  d3.forceCenter(w/2, h/2))
    .force('collide', d3.forceCollide(d => r(d) + 20).strength(.9))
    .on('tick', () => {
      mmLinks.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
             .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      mmNodes.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

function drawClusterLegend(nodes) {
  const legend = document.getElementById('mm-legend');
  if (!legend || !mmCc) return;
  const groups = {};
  nodes.forEach(n => {
    if (!groups[n.clusterId]) groups[n.clusterId] = [];
    groups[n.clusterId].push(n);
  });
  S.mm.clusterNodes = {};
  const clusters = Object.entries(groups)
    .map(([id, ns]) => {
      const top = ns.slice().sort((a,b)=>b.degree-a.degree)[0];
      S.mm.clusterNodes[+id] = ns.map(n => n.name);
      return { id: +id, name: top.name, count: ns.length, color: mmCc(+id) };
    })
    .sort((a,b) => b.count - a.count);

  legend.innerHTML = clusters.map(cl => `
    <div class="mm-chip" data-cid="${cl.id}" title="${cl.count} Konzepte">
      <div class="mm-chip-dot" style="background:${cl.color}"></div>
      <span>${esc(cl.name)}</span>
      <span style="color:var(--dim)">${cl.count}</span>
    </div>`).join('') +
    `<button class="btn btn-ghost btn-sm" id="mm-quiz-btn" style="display:none;margin-left:auto">${IC.quiz} Quiz</button>`;

  legend.querySelectorAll('.mm-chip').forEach(chip => {
    chip.addEventListener('click', e => {
      e.stopPropagation();
      const cid = +chip.dataset.cid;
      const quizBtn = document.getElementById('mm-quiz-btn');
      if (S.mm.activeCluster === cid) {
        S.mm.activeCluster = null;
        chip.classList.remove('active');
        mmNodes?.attr('opacity',1);
        mmLinks?.attr('stroke-opacity',.45);
        if (quizBtn) quizBtn.style.display='none';
      } else {
        S.mm.activeCluster = cid;
        legend.querySelectorAll('.mm-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        applyClusterFilter(cid);
        if (quizBtn) quizBtn.style.display='';
      }
    });
  });

  document.getElementById('mm-quiz-btn')?.addEventListener('click', () => {
    const cid = S.mm.activeCluster;
    if (cid == null) return;
    const concepts = S.mm.clusterNodes[cid] || [];
    openQuizModal(concepts);
  });
}

function applyClusterFilter(clusterId) {
  mmNodes?.attr('opacity', d => d.clusterId === clusterId ? 1 : 0.07);
  mmLinks?.attr('stroke-opacity', l =>
    (l.source.clusterId === clusterId && l.target.clusterId === clusterId) ? .6 : .04);
}

function mmHighlight(q) {
  if (!mmNodes) return;
  const t = q.toLowerCase();
  mmNodes.attr('opacity', d=>!t||d.name.toLowerCase().includes(t)?1:.12);
}

function closeDetail() {
  document.getElementById('mm-detail')?.classList.remove('open');
  if (S.mm.activeCluster !== null) {
    applyClusterFilter(S.mm.activeCluster);
  } else {
    mmNodes?.attr('opacity',1);
    mmLinks?.attr('stroke-opacity',.45);
  }
}

function mmNeighbors(node) {
  if (!mmData) return [];
  const nodeById = Object.fromEntries(mmData.nodes.map(n=>[n.id, n]));
  const neighbors = [];
  mmData.links.forEach(l => {
    const sid = l.source?.id ?? l.source;
    const tid = l.target?.id ?? l.target;
    if (sid === node.id && nodeById[tid]) neighbors.push({ node: nodeById[tid], weight: l.weight });
    else if (tid === node.id && nodeById[sid]) neighbors.push({ node: nodeById[sid], weight: l.weight });
  });
  return neighbors.sort((a,b) => b.weight - a.weight).slice(0, 8);
}

function renderExplanationBox(text) {
  return `<div style="font-size:13px;line-height:1.6;color:var(--fg);background:var(--surface2);border-radius:8px;padding:10px 12px;position:relative">
    ${esc(text)}
    <button id="det-copy-btn" title="Kopieren" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;color:var(--dim);padding:2px 4px;border-radius:4px;font-size:11px" onmouseenter="this.style.color='var(--text)'" onmouseleave="this.style.color='var(--dim)'">⎘</button>
  </div>`;
}

async function showConceptDetail(node) {
  const panel = document.getElementById('mm-detail');
  if (!panel) return;

  const docs     = (node.documents||[]);
  const docBadges = docs.map(n => `<span class="src-chip">${IC.doc} ${esc(cleanName(n))}</span>`).join('');
  const clrDot   = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${mmCc?mmCc(node.clusterId):'#888'}"></span>`;
  const neighbors = mmNeighbors(node);
  const neighborHtml = neighbors.length
    ? `<div class="det-section">Verwandte Konzepte</div>
       <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${
         neighbors.map(({node:n}) =>
           `<button class="mm-chip" data-nid="${n.id}" style="cursor:pointer;border-radius:10px;font-size:11px">
             <span class="mm-chip-dot" style="background:${mmCc?mmCc(n.clusterId):'#888'}"></span>${esc(n.name)}
           </button>`
         ).join('')
       }</div>`
    : '';

  const cachedExpl = S.mm.explanations[node.name];
  const aiHtml = cachedExpl
    ? renderExplanationBox(cachedExpl)
    : `<button class="btn btn-ghost btn-sm" id="det-explain-btn" style="width:100%">${IC.star} Von Claude erklären lassen</button>`;

  const cachedExcerpts = S.mm.excerpts[node.name];
  const excerptsHtml = cachedExcerpts !== undefined
    ? renderExcerpts(cachedExcerpts)
    : `${spinner()} Suche…`;

  panel.innerHTML = `
    <div class="det-head">
      <div style="flex:1">
        <h3>${esc(node.name)}</h3>
        <p>${node.degree} Verbindungen · <span style="display:inline-flex;align-items:center;gap:4px">${clrDot}Cluster ${node.clusterId}</span></p>
        ${docBadges ? `<div class="det-docs">${docBadges}</div>` : ''}
      </div>
      <button class="det-close" onclick="closeDetail()">×</button>
    </div>
    <div class="det-body">
      ${neighborHtml}
      <div class="det-section">KI-Erklärung</div>
      <div id="det-ai" style="margin-bottom:12px">${aiHtml}</div>
      <div class="det-section">Textstellen aus deinen Skripten</div>
      <div id="det-excerpts" style="color:var(--dim);font-size:12px">${excerptsHtml}</div>
    </div>`;
  panel.classList.add('open');

  // Copy button for cached explanation
  if (cachedExpl) wireCopyBtn(cachedExpl);

  // Neighbor chips → navigate to that node
  panel.querySelectorAll('[data-nid]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const targetNode = mmData?.nodes.find(n => n.id === +btn.dataset.nid);
      if (targetNode) {
        mmNodes?.attr('opacity', n => n.id === targetNode.id ? 1 : .08);
        showConceptDetail(targetNode);
      }
    });
  });

  // Explain button
  document.getElementById('det-explain-btn')?.addEventListener('click', async function() {
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = `${spinner()} Claude erklärt…`;
    try {
      const res = await fetch(`/api/mindmap/explain?concept=${encodeURIComponent(node.name)}`, {method:'POST'}).then(r=>r.json());
      const explanation = res.explanation || '';
      S.mm.explanations[node.name] = explanation;
      document.getElementById('det-ai').innerHTML = renderExplanationBox(explanation);
      wireCopyBtn(explanation);
    } catch {
      btn.disabled = false;
      btn.innerHTML = `${IC.star} Von Claude erklären lassen`;
    }
  });

  // Excerpts (cached or fetch)
  if (cachedExcerpts === undefined) {
    try {
      const results = await fetch(`/api/search?q=${encodeURIComponent(node.name)}`).then(r=>r.json());
      S.mm.excerpts[node.name] = results;
      const box = document.getElementById('det-excerpts');
      if (box) box.innerHTML = renderExcerpts(results);
    } catch {
      const box = document.getElementById('det-excerpts');
      if (box) box.innerHTML = `<div style="color:var(--dim);font-size:12px">Fehler beim Laden.</div>`;
    }
  }
}

function renderExcerpts(results) {
  if (!results.length) return `<div style="color:var(--dim);font-size:12px;padding:8px 0">Keine Textstellen gefunden.</div>`;
  return results.slice(0,5).map(r => {
    const snippet = (r.text||'').substring(0,200).replace(/\n/g,' ');
    return `<div class="det-excerpt">
      <div class="det-src">${IC.doc} ${esc(cleanName(r.documentName||''))} &nbsp;·&nbsp; Seite ${r.page||'?'}</div>
      <div class="det-text">${esc(snippet)}…</div>
    </div>`;
  }).join('');
}

function wireCopyBtn(text) {
  document.getElementById('det-copy-btn')?.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('det-copy-btn');
      if (btn) { btn.textContent='✓'; setTimeout(()=>{ if(btn) btn.textContent='⎘'; }, 1500); }
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
// VIEW: FLASHCARDS
// ═══════════════════════════════════════════════════════════════════
async function drawFC(el) {
  el.innerHTML = `
    <div class="view-header">
      <div><div class="view-title">Lernkarten</div><div class="view-sub">KI-generierte Flashcards · Leertaste zum Umdrehen</div></div>
      <div class="view-actions">
        <select class="form-select" id="fc-doc">
          <option value="">Dokument wählen…</option>${docOptions(S.fc.docId)}
        </select>
        <button class="btn btn-primary btn-sm" id="fc-gen">${IC.star} Generieren</button>
        <button class="btn btn-ghost btn-sm" id="fc-learn" title="Nur unbekannte Karten anzeigen">Lernmodus</button>
        <button class="btn btn-ghost btn-sm" id="fc-due"   title="Nur heute fällige Karten lernen" style="color:#f59e0b;border-color:#f59e0b40">Fällige Karten</button>
        <button class="btn btn-ghost btn-sm" id="fc-reset" title="Bewertungen zurücksetzen">Reset</button>
        <button class="btn btn-ghost btn-sm" id="fc-exp" title="Als Markdown exportieren">${IC.exp} Export</button>
      </div>
    </div>
    <div class="view-body" style="display:flex;justify-content:center">
      <div id="fc-body" style="width:100%;max-width:600px"></div>
    </div>`;

  document.getElementById('fc-doc').onchange = async e=>{
    S.fc.docId = e.target.value ? +e.target.value : null;
    S.fc.idx=0; S.fc.flip=false; S.fc.learnMode=false;
    if (S.fc.docId) { S.fc.cards = await api.fc(S.fc.docId).catch(()=>[]); }
    else S.fc.cards=[];
    drawFCBody();
  };

  document.getElementById('fc-gen').onclick = ()=>{
    if (!S.fc.docId) { toast('Bitte erst ein Dokument wählen','inf'); return; }
    triggerGenFC(S.fc.docId);
  };

  document.getElementById('fc-learn').onclick = ()=>{
    if (!S.fc.cards.length) { toast('Keine Lernkarten geladen','inf'); return; }
    startLearnSession();
  };

  document.getElementById('fc-due').onclick = async ()=>{
    if (!S.fc.docId) { toast('Bitte erst ein Dokument wählen','inf'); return; }
    const due = await api.fcDue(S.fc.docId).catch(()=>[]);
    if (!due.length) { toast('Keine fälligen Karten — alles auf dem neuesten Stand!', 'ok'); return; }
    S.fc.session = { queue: due, idx: 0, known: 0, unknown: 0, failed: [], dueMode: true };
    S.fc.learnMode = true;
    S.fc.flip = false;
    drawFCBody();
  };

  document.getElementById('fc-reset').onclick = async ()=>{
    if (!S.fc.docId) { toast('Kein Dokument gewählt','inf'); return; }
    await api.resetCards(S.fc.docId).catch(()=>{});
    S.fc.cards = await api.fc(S.fc.docId).catch(()=>[]);
    S.fc.idx=0; S.fc.flip=false; S.fc.learnMode=false; S.fc.session=null;
    toast('Bewertungen zurückgesetzt', 'ok');
    drawFCBody();
  };

  document.getElementById('fc-exp').onclick = ()=>{
    if (!S.fc.docId) { toast('Kein Dokument gewählt','inf'); return; }
    window.open(`/api/export/flashcards/${S.fc.docId}`, '_blank');
  };

  if (S.fc.docId) { S.fc.cards = await api.fc(S.fc.docId).catch(()=>[]); }
  drawFCBody();

  document.onkeydown = e=>{
    if (S.view!=='fc') return;
    const c=S.fc.cards, i=S.fc.idx;
    if (e.key==='ArrowLeft'  && i>0)         { e.preventDefault(); S.fc.idx--; S.fc.flip=false; drawFCBody(); }
    if (e.key==='ArrowRight' && i<c.length-1){ e.preventDefault(); S.fc.idx++; S.fc.flip=false; drawFCBody(); }
    if (e.key===' ')                          { e.preventDefault(); S.fc.flip=!S.fc.flip; drawFCBody(); }
  };
}

function triggerGenFC(docId) {
  const btn = document.getElementById('fc-gen');
  const body = document.getElementById('fc-body');
  if (btn) { btn.disabled=true; btn.innerHTML=`${spinner()} Generiert…`; }
  if (body) body.innerHTML=`<div class="empty">${spinner()}<p style="margin-top:12px;color:var(--dim)">Lernkarten werden erstellt…</p></div>`;

  const es = new EventSource(`/api/flashcards/generate-stream?documentId=${docId}`);

  es.addEventListener('progress', e => {
    const d = JSON.parse(e.data);
    const pct = Math.round(d.chunk / d.totalChunks * 100);
    if (body) body.innerHTML=`<div class="empty">
      <p style="color:var(--dim);margin-bottom:8px">Chunk ${d.chunk}/${d.totalChunks} · ${d.createdCards} Karten</p>
      <div style="width:240px;height:4px;background:var(--border);border-radius:2px;margin:0 auto">
        <div style="height:100%;width:${pct}%;background:var(--primary);border-radius:2px;transition:width .3s"></div></div>
    </div>`;
  });

  es.addEventListener('done', async e => {
    es.close();
    const r = JSON.parse(e.data);
    toast(`${r.createdCards} Lernkarten erstellt`, 'ok');
    S.fc.cards = await api.fc(docId).catch(()=>[]);
    S.fc.idx=0; S.fc.flip=false;
    drawFCBody();
    if (btn) { btn.disabled=false; btn.innerHTML=`${IC.star} Generieren`; }
  });

  es.addEventListener('error', () => {
    es.close();
    toast('Fehler beim Generieren', 'err');
    if (btn) { btn.disabled=false; btn.innerHTML=`${IC.star} Generieren`; }
    drawFCBody();
  });
}

function fcRatingBar(cards) {
  const known   = cards.filter(c=>c.known===true).length;
  const unknown = cards.filter(c=>c.known===false).length;
  const total   = cards.length;
  if (!total) return '';
  return `<div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim)">
    <span style="color:#22c55e">✓ ${known}</span>
    <div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${Math.round(known/total*100)}%;background:#22c55e;border-radius:2px"></div>
    </div>
    <span>${known}/${total} gewusst</span>
  </div>`;
}

function nextReviewBadge(card) {
  if (!card.nextReview) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const rev   = new Date(card.nextReview); rev.setHours(0,0,0,0);
  const days  = Math.round((rev - today) / 86400000);
  let label, color;
  if (days <= 0) {
    label = 'Heute fällig'; color = '#ef4444';
  } else if (days === 1) {
    label = 'Morgen fällig'; color = '#f59e0b';
  } else {
    label = `Nächste Wiederholung in ${days} Tagen`; color = 'var(--dim)';
  }
  return `<div style="margin-top:10px;font-size:11px;color:${color};text-align:center">${label}</div>`;
}

function startLearnSession() {
  const queue = S.fc.cards.filter(c => c.known !== true);
  if (!queue.length) { toast('Alle Karten bereits gewusst! Super! 🎉', 'ok'); return; }
  S.fc.session = { queue: [...queue], idx: 0, known: 0, unknown: 0, failed: [] };
  S.fc.learnMode = true;
  S.fc.flip = false;
  drawFCBody();
}

function stopLearnSession() {
  S.fc.session = null;
  S.fc.learnMode = false;
  S.fc.flip = false;
  drawFCBody();
}

function drawFCBody() {
  const body = document.getElementById('fc-body');
  if (!body) return;
  const cards = S.fc.cards;
  if (!cards.length) {
    body.innerHTML=`<div class="empty">${IC.card}<br><h3>Keine Lernkarten</h3>
      <p>Wähle ein Dokument und klicke auf „Generieren"</p></div>`;
    return;
  }

  if (S.fc.session) { drawLearnCard(body); return; }

  const i=S.fc.idx, c=cards[i];
  const knownCls = c.known===true ? ' style="border-color:#22c55e"' : c.known===false ? ' style="border-color:#ef4444"' : '';
  body.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:8px">
      ${fcRatingBar(cards)}
      <div class="fc-scene">
        <div class="fc-card${S.fc.flip?' flipped':''}" id="fc-el"${knownCls}>
          <div class="fc-face fc-front">
            <div class="fc-label">Frage ${i+1}/${cards.length}</div>
            <div class="fc-text">${esc(c.question)}</div>
            <div class="fc-hint">Klicken oder Leertaste zum Umdrehen</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label">Antwort</div>
            <div class="fc-text">${esc(c.answer)}</div>
            ${nextReviewBadge(c)}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn btn-sm" id="fc-no"  style="background:#ef444420;color:#ef4444;border-color:#ef4444">✕ Nicht gewusst</button>
        <button class="btn btn-sm" id="fc-yes" style="background:#22c55e20;color:#22c55e;border-color:#22c55e">✓ Gewusst</button>
      </div>
      <div class="fc-nav">
        <button class="btn btn-ghost btn-sm" id="fc-prev"${i===0?' disabled':''}>← Zurück</button>
        <span class="fc-count">${i+1} / ${cards.length}</span>
        <button class="btn btn-ghost btn-sm" id="fc-next"${i===cards.length-1?' disabled':''}>Weiter →</button>
      </div>
      <div class="fc-dots">${cards.map((_,j)=>{
        const dot = cards[j].known===true?'#22c55e':cards[j].known===false?'#ef4444':'var(--border)';
        return `<div class="fc-dot${j===i?' on':''}" style="${j===i?'':'background:'+dot}"></div>`;
      }).join('')}</div>
    </div>`;

  document.getElementById('fc-el').onclick  = ()=>{ S.fc.flip=!S.fc.flip; drawFCBody(); };
  document.getElementById('fc-prev')?.addEventListener('click', ()=>{ S.fc.idx--; S.fc.flip=false; drawFCBody(); });
  document.getElementById('fc-next')?.addEventListener('click', ()=>{ S.fc.idx++; S.fc.flip=false; drawFCBody(); });
  document.getElementById('fc-yes')?.addEventListener('click', async ()=>{
    const updated = await api.rateCard(c.id, true).catch(()=>null);
    S.fc.cards[i].known = true;
    if (updated?.nextReview) S.fc.cards[i].nextReview = updated.nextReview;
    if (i < cards.length-1) { S.fc.idx++; S.fc.flip=false; }
    drawFCBody();
  });
  document.getElementById('fc-no')?.addEventListener('click', async ()=>{
    const updated = await api.rateCard(c.id, false).catch(()=>null);
    S.fc.cards[i].known = false;
    if (updated?.nextReview) S.fc.cards[i].nextReview = updated.nextReview;
    if (i < cards.length-1) { S.fc.idx++; S.fc.flip=false; }
    drawFCBody();
  });
}

function drawLearnCard(body) {
  const sess = S.fc.session;
  if (sess.idx >= sess.queue.length) { drawLearnResults(body); return; }
  const c = sess.queue[sess.idx];
  const total = sess.queue.length;
  const pct = Math.round((sess.idx / total) * 100);
  body.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:8px">
      <div style="width:100%;max-width:520px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px">
          <span>Lernmodus · ${sess.idx+1} / ${total}</span>
          <button class="btn btn-ghost btn-sm" id="learn-exit" style="padding:0 6px;height:22px;font-size:11px">Beenden</button>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:2px">
          <div style="height:100%;width:${pct}%;background:var(--primary);border-radius:2px;transition:width .3s"></div>
        </div>
      </div>
      <div class="fc-scene">
        <div class="fc-card${S.fc.flip?' flipped':''}" id="fc-el">
          <div class="fc-face fc-front">
            <div class="fc-label">Frage ${sess.idx+1} von ${total}</div>
            <div class="fc-text">${esc(c.question)}</div>
            <div class="fc-hint">${S.fc.flip ? '' : 'Klicken zum Aufdecken'}</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label">Antwort</div>
            <div class="fc-text">${esc(c.answer)}</div>
            ${nextReviewBadge(c)}
          </div>
        </div>
      </div>
      ${S.fc.flip ? `
      <div style="display:flex;gap:12px">
        <button class="btn btn-sm" id="learn-no"  style="background:#ef444420;color:#ef4444;border-color:#ef4444;min-width:140px">✕ Nicht gewusst</button>
        <button class="btn btn-sm" id="learn-yes" style="background:#22c55e20;color:#22c55e;border-color:#22c55e;min-width:140px">✓ Gewusst</button>
      </div>` : `
      <div style="color:var(--dim);font-size:13px">Karte umdrehen, dann bewerten</div>`}
    </div>`;

  document.getElementById('fc-el').onclick = ()=>{ S.fc.flip=!S.fc.flip; drawFCBody(); };
  document.getElementById('learn-exit')?.addEventListener('click', stopLearnSession);
  document.getElementById('learn-yes')?.addEventListener('click', async ()=>{
    const updated = await api.rateCard(c.id, true).catch(()=>null);
    if (updated?.nextReview) c.nextReview = updated.nextReview;
    sess.known++; sess.idx++; S.fc.flip=false; drawFCBody();
  });
  document.getElementById('learn-no')?.addEventListener('click', async ()=>{
    const updated = await api.rateCard(c.id, false).catch(()=>null);
    if (updated?.nextReview) c.nextReview = updated.nextReview;
    sess.failed.push(c); sess.unknown++; sess.idx++; S.fc.flip=false; drawFCBody();
  });
}

function drawLearnResults(body) {
  const sess = S.fc.session;
  const total = sess.known + sess.unknown;
  const pct = total > 0 ? Math.round((sess.known / total) * 100) : 0;
  const color = pct >= 80 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444';
  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';
  body.innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;padding-top:24px;max-width:420px;margin:0 auto;text-align:center">
      <div style="font-size:48px">${emoji}</div>
      <div>
        <div style="font-size:32px;font-weight:700;color:${color}">${pct}%</div>
        <div style="font-size:14px;color:var(--dim);margin-top:4px">Erfolgsquote</div>
      </div>
      <div style="display:flex;gap:32px">
        <div>
          <div style="font-size:24px;font-weight:600;color:#22c55e">${sess.known}</div>
          <div style="font-size:12px;color:var(--dim)">Gewusst</div>
        </div>
        <div style="width:1px;background:var(--border)"></div>
        <div>
          <div style="font-size:24px;font-weight:600;color:#ef4444">${sess.unknown}</div>
          <div style="font-size:12px;color:var(--dim)">Nicht gewusst</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        ${sess.unknown > 0 ? `<button class="btn btn-primary btn-sm" id="learn-retry">↺ Nochmal (${sess.unknown} falsche)</button>` : ''}
        <button class="btn btn-ghost btn-sm" id="learn-done">Fertig</button>
      </div>
    </div>`;

  document.getElementById('learn-done')?.addEventListener('click', ()=>{
    S.fc.session = null; S.fc.learnMode = false;
    S.fc.cards = S.fc.cards; drawFCBody();
  });
  document.getElementById('learn-retry')?.addEventListener('click', ()=>{
    S.fc.session = { queue: sess.failed, idx: 0, known: 0, unknown: 0, failed: [] };
    S.fc.flip = false; drawFCBody();
  });
}
